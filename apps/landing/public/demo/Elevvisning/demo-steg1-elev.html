<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevvisning – Steg 1: Stem og begrunn</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family-body);
      background: #E8E0F0;
      padding: var(--space-8) var(--space-6);
      min-height: 100vh;
    }

    /* ── Page title ── */
    .page-title {
      font-size: var(--text-2xl); font-weight: var(--font-extrabold);
      color: var(--color-primary-700); margin-bottom: var(--space-8);
      text-align: center;
    }

    /* ── Step navigation bar ── */
    .step-nav-bar {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .step-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-1-5);
      padding: var(--space-3) var(--space-2);
      border-radius: var(--radius-xl);
      text-align: center;
      text-decoration: none;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .step-nav-item:hover { opacity: 0.7; }
    .step-nav-num {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: var(--font-extrabold);
      background: var(--color-neutral-200); color: var(--color-neutral-500); flex-shrink: 0;
    }
    .step-nav-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      color: var(--color-text-tertiary); line-height: 1.2;
    }
    .step-nav-item.active {
      opacity: 1; background: var(--color-primary-100); cursor: default;
    }
    .step-nav-item.active .step-nav-num { background: var(--color-primary-500); color: white; }
    .step-nav-item.active .step-nav-label { color: var(--color-primary-700); }

    /* ── Device row ── */
    .devices-row {
      display: flex;
      gap: var(--space-10);
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .device-col {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
    }
    .device-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--color-neutral-500);
    }

    /* ══════════════════════════════════════
       iPAD PRO 13" FRAMES (same as steg0)
       ══════════════════════════════════════ */

    /* ── iPad Landscape ── */
    .ipad-landscape {
      position: relative;
      width: 700px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }
    .ipad-landscape .ipad-frame-img {
      position: absolute;
      width: 826px;
      height: auto;
      top: 50%;
      left: calc(50% + 2.25px);
      transform: translate(-50%, -50%) rotate(90deg) scaleY(0.991);
      z-index: 2;
      pointer-events: none;
    }
    .ipad-landscape .ipad-screen {
      position: absolute;
      top: 7.33%;
      left: 5.10%;
      width: 89.81%;
      height: 86.28%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 6px;
      z-index: 1;
    }

    /* ── iPad Portrait ── */
    .ipad-portrait {
      position: relative;
      width: 755px;
    }
    .ipad-portrait .ipad-frame-img {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }
    .ipad-portrait .ipad-screen {
      position: absolute;
      top: 8.94%;
      left: 23.12%;
      width: 53.18%;
      height: 82.12%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 8px;
      z-index: 1;
    }

    /* ══════════════════════════════════════
       STUDENT VIEW – shared styles
       ══════════════════════════════════════ */

    /* Top bar – larger than steg 0 */
    .sv-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-5);
      height: 56px; min-height: 56px;
      background: var(--color-neutral-0);
      border-bottom: 1.5px solid var(--color-neutral-200);
    }
    .sv-topbar-left {
      display: flex; align-items: center; gap: var(--space-3);
    }
    .sv-topbar-logo { height: 30px; object-fit: contain; }
    .sv-topbar-divider { width: 1.5px; height: 24px; background: var(--color-neutral-300); }
    .sv-topbar-title {
      font-size: 14px; font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }
    .sv-step-badge {
      font-size: 12px; font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
      background: var(--color-neutral-100);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }
    .sv-step-badge .badge-short { display: none; }
    .sv-topbar-right {
      display: flex; align-items: center; gap: var(--space-2);
    }
    .sv-nickname-badge {
      font-size: 12px; font-weight: var(--font-bold);
      color: var(--color-primary-700);
      background: var(--color-primary-100);
      padding: 4px 10px;
      border-radius: var(--radius-full);
    }

    /* Main content area – pushed down to leave room for fasit box in steg 4 */
    .sv-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-5) var(--space-5);
      min-height: 0;
      overflow: hidden;
    }

    /* ── Content wrapper: constrains all elements to same width ── */
    .sv-content {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
    }

    /* ── Section groups: wraps label + interactive element ── */
    .sv-section {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: var(--space-2);
    }

    /* ── Selected statement card ── */
    .sv-stmt-card {
      padding: var(--space-5) var(--space-5);
      border-radius: var(--radius-xl);
      font-weight: var(--font-bold);
      font-size: 16px;
      line-height: var(--leading-relaxed);
      border: 2px solid;
      text-align: center;
    }
    .sv-card-blue   { background: #E8F4FD; color: #1565C0; border-color: #90CAF9; }
    .sv-card-yellow { background: #FFF8E1; color: #5D4037; border-color: #FFD54F; }
    .sv-card-orange { background: #FFF3E0; color: #BF360C; border-color: #FFB74D; }
    .sv-card-purple { background: #F3E5F5; color: #6A1B9A; border-color: #CE93D8; }
    .sv-card-red    { background: #FFEBEE; color: #B71C1C; border-color: #EF9A9A; }

    /* ── Section label ── */
    .sv-section-label {
      font-size: 14px;
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      text-align: center;
    }

    /* ── Vote buttons (pill-shaped, 3D box-shadow style) ── */
    .sv-vote-row {
      display: flex;
      gap: var(--space-3);
    }
    .sv-vote-btn {
      flex: 1;
      padding: var(--space-3) var(--space-2);
      border: none;
      border-radius: var(--radius-2xl);
      font-size: 15px;
      font-weight: var(--font-bold);
      color: white;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
    }
    .sv-vote-sant {
      background: var(--color-sant);
      box-shadow: 0 4px 0 #2E7D32;
    }
    .sv-vote-delvis {
      background: var(--color-delvis);
      box-shadow: 0 4px 0 #E65100;
    }
    .sv-vote-usant {
      background: var(--color-usant);
      box-shadow: 0 4px 0 #B71C1C;
    }
    /* Selected vote */
    .sv-vote-btn.selected {
      outline: 3px solid white;
      outline-offset: -3px;
    }
    .sv-vote-btn:not(.selected) { opacity: 1; }
    .sv-vote-row.has-selection .sv-vote-btn:not(.selected) { opacity: 0.45; }


    /* ── Confidence scale (pill-shaped, white, same 3D style) ── */
    .sv-confidence-row {
      display: flex;
      gap: var(--space-3);
    }
    .sv-confidence-btn {
      flex: 1;
      padding: var(--space-3) var(--space-2);
      border: 2px solid var(--color-neutral-200);
      border-radius: var(--radius-2xl);
      background: var(--color-neutral-0);
      font-size: 15px;
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 var(--color-neutral-300);
    }
    .sv-confidence-btn.selected {
      background: var(--color-primary-500);
      color: white;
      border-color: var(--color-primary-500);
      box-shadow: 0 2px 0 var(--color-primary-700);
      transform: translateY(2px);
    }

    /* ── Submit button ── */
    .sv-submit-btn {
      padding: var(--space-3) var(--space-6);
      border: none;
      border-radius: var(--radius-2xl);
      background: var(--color-primary-500);
      color: white;
      font-size: 15px;
      font-weight: var(--font-bold);
      cursor: pointer;
      box-shadow: 0 4px 0 var(--color-primary-700);
      align-self: center;
      margin-top: auto;
      transition: opacity 0.2s, background 0.2s;
    }
    .sv-submit-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--color-primary-700);
    }
    .sv-submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .sv-submit-btn.sent {
      background: #4CAF50;
      box-shadow: 0 4px 0 #2E7D32;
      pointer-events: none;
      opacity: 1;
    }

    /* ── Waiting state ── */
    .sv-waiting {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      flex: 1;
      padding: var(--space-6);
    }
    .sv-waiting.visible { display: flex; }
    .sv-waiting-title {
      font-size: 18px;
      font-weight: var(--font-extrabold);
      color: var(--color-primary-700);
    }
    .sv-waiting-professor {
      width: 140px; height: 140px;
      border-radius: var(--radius-full);
      object-fit: cover;
      border: 4px solid var(--color-primary-200);
      background: var(--color-bg-tertiary);
    }
    .sv-waiting-text {
      font-size: 14px;
      font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
    }
    .sv-waiting-dots {
      display: flex;
      gap: 6px;
      margin-top: var(--space-1);
    }
    .sv-waiting-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-neutral-400);
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .sv-waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
    .sv-waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* ── Reasoning textarea ── */
    .sv-reasoning-box {
      width: 100%;
      min-height: 80px;
      border: 1.5px solid var(--color-neutral-300);
      border-radius: var(--radius-xl);
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-family-body);
      font-size: 13px;
      color: var(--color-text-primary);
      resize: none;
      background: var(--color-neutral-0);
    }
    .sv-reasoning-box::placeholder {
      color: var(--color-text-tertiary);
    }

    /* ── Disabled state (before timer starts) ── */
    .sv-content.disabled .sv-section,
    .sv-content.disabled + .sv-submit-btn {
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Timer badge in topbar ── */
    .sv-timer-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--color-usant-bg, #FFEBEE);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }
    .sv-timer-badge.visible { display: flex; }
    .sv-timer-badge svg {
      width: 16px; height: 16px;
      color: var(--color-error, #D32F2F);
      flex-shrink: 0;
    }
    .sv-timer-badge .sv-timer-value {
      font-family: var(--font-family-mono, monospace);
      font-size: 13px;
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      line-height: 1;
    }

    /* ══════════════════════════════════════
       Landscape overrides
       ══════════════════════════════════════ */
    .ipad-landscape .sv-body {
      padding: var(--space-3) var(--space-5);
      justify-content: space-between;
    }
    .ipad-landscape .sv-content {
      gap: var(--space-4);
      max-width: 100%;
      flex: 1;
    }
    .ipad-landscape .sv-stmt-card {
      padding: var(--space-3) var(--space-5);
      font-size: 17px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ipad-landscape .sv-section { gap: var(--space-1-5); }
    .ipad-landscape .sv-section-label { font-size: 12px; }
    .ipad-landscape .sv-vote-btn { font-size: 13px; padding: var(--space-2) var(--space-3); }
    .ipad-landscape .sv-confidence-btn { font-size: 13px; padding: var(--space-2) var(--space-3); }
    .ipad-landscape .sv-reasoning-box { min-height: 48px; font-size: 12px; flex: 1; }
    .ipad-landscape .sv-submit-btn { font-size: 13px; padding: var(--space-2) var(--space-5); margin-bottom: var(--space-5); }

    /* ══════════════════════════════════════
       Portrait overrides
       ══════════════════════════════════════ */
    .ipad-portrait .sv-topbar {
      height: 48px; min-height: 48px;
      padding: 0 var(--space-4);
    }
    .ipad-portrait .sv-topbar-logo { height: 26px; }
    .ipad-portrait .sv-topbar-divider { height: 20px; }
    .ipad-portrait .sv-topbar-title { font-size: 12px; }
    .ipad-portrait .sv-step-badge { font-size: 10px; padding: 3px 8px; white-space: nowrap; }
    .ipad-portrait .sv-step-badge .badge-full { display: none; }
    .ipad-portrait .sv-step-badge .badge-short { display: inline; }
    .ipad-portrait .sv-nickname-badge { font-size: 10px; padding: 3px 8px; }
    .ipad-portrait .sv-body {
      padding: var(--space-5) var(--space-5);
      justify-content: flex-start;
    }
    .ipad-portrait .sv-content {
      gap: var(--space-5);
      max-width: 100%;
    }
    .ipad-portrait .sv-stmt-card {
      padding: var(--space-5) var(--space-5);
      font-size: 16px;
    }
    .ipad-portrait .sv-section-label { font-size: 13px; }
    .ipad-portrait .sv-vote-btn { font-size: 13px; padding: var(--space-3); }
    .ipad-portrait .sv-confidence-btn { font-size: 13px; padding: var(--space-3); }
    .ipad-portrait .sv-reasoning-box { min-height: 100px; font-size: 14px; }
    .ipad-portrait .sv-submit-btn { font-size: 15px; padding: var(--space-3) var(--space-6); }
  </style>
  <style>
    /* ── Mine svar floating button + panel ── */
    .mine-svar-fab {
      position: absolute;
      bottom: 27px; left: 14px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--color-neutral-400);
      color: white;
      border: none;
      cursor: pointer;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .mine-svar-fab:hover { transform: scale(1.08); background: var(--color-neutral-500); }
    .mine-svar-fab:active { transform: scale(0.95); }
    .mine-svar-fab svg { width: 20px; height: 20px; }

    .mine-svar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      padding-top: 47px;
    }
    .mine-svar-overlay.visible { display: flex; }

    .mine-svar-panel {
      background: white;
      border-radius: 16px;
      width: 60%;
      max-width: 420px;
      max-height: 85%;
      overflow-y: auto;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
      animation: minesvar-slide-up 0.25s ease;
    }
    @keyframes minesvar-slide-up {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .mine-svar-header {
      display: flex; align-items: center; justify-content: center;
      position: relative;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--color-neutral-100);
    }
    .mine-svar-title {
      font-size: 15px; font-weight: var(--font-extrabold);
      color: var(--color-text-primary);
    }
    .mine-svar-close {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-neutral-100);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: background 0.15s;
    }
    .mine-svar-close:hover { background: var(--color-neutral-200); }
    .mine-svar-close svg { width: 14px; height: 14px; }

    .mine-svar-body { padding: 14px 16px; display: flex; flex-direction: column; align-items: center; }
    .mine-svar-columns {
      display: flex; gap: 40px;
    }
    .mine-svar-col { min-width: 0; text-align: center; }
    .mine-svar-round-label {
      font-size: 11px; font-weight: var(--font-extrabold);
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--color-text-tertiary);
      margin-bottom: 10px;
    }
    .mine-svar-row {
      display: flex; align-items: center; gap: 8px;
    }
    .mine-svar-vote-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: var(--font-bold);
      color: white;
    }
    .mine-svar-vote-badge.sant { background: var(--color-sant); }
    .mine-svar-vote-badge.delvis { background: var(--color-delvis); color: white; }
    .mine-svar-vote-badge.usant { background: var(--color-error); }
    .mine-svar-conf-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      background: transparent; border: 2.5px solid;
      font-size: 11px; font-weight: var(--font-extrabold);
    }
    .mine-svar-conf-badge.cc-1 { border-color: #EF5350; color: #EF5350; }
    .mine-svar-conf-badge.cc-2 { border-color: #FF9800; color: #FF9800; }
    .mine-svar-conf-badge.cc-3 { border-color: #FDD835; color: #b8a000; }
    .mine-svar-conf-badge.cc-4 { border-color: #66BB6A; color: #66BB6A; }
    .mine-svar-conf-badge.cc-5 { border-color: #2E7D32; color: #2E7D32; }
    .mine-svar-ghost-row {
      display: flex; align-items: center; gap: 8px;
    }
    .mine-svar-ghost-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: var(--radius-full);
      font-size: 12px; font-weight: var(--font-bold);
      color: transparent;
      border: 1.5px dashed var(--color-neutral-400);
      background: transparent;
    }
    .mine-svar-ghost-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px dashed var(--color-neutral-400);
    }
    .mine-svar-reason {
      font-size: 12px; line-height: 1.5;
      color: var(--color-text-secondary);
      background: var(--color-neutral-50, #f9f9f9);
      border-radius: var(--radius-lg);
      padding: 8px 12px;
      margin-top: 12px;
      font-style: italic;
      width: 100%; box-sizing: border-box;
      align-self: stretch;
    }
  </style>
  <style>
    html, body { background: transparent !important; background-color: transparent !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
    .devices-row { padding: 0 !important; margin: 0 !important; background: transparent !important; justify-content: center !important; }
    .device-col { padding: 0 !important; margin: 0 !important; background: transparent !important; }
  </style>
</head>
<body>
  <div class="devices-row">

    <!-- ════════════════ iPad Liggende ════════════════ -->
    <div class="device-col">
      <div class="ipad-landscape">
        <img src="../assets/iPad.png" alt="" class="ipad-frame-img">
        <div class="ipad-screen">
          <div class="sv-topbar">
            <div class="sv-topbar-left">
              <img src="../assets/FagPrat - logo.png" alt="FagPrat" class="sv-topbar-logo">
              <div class="sv-topbar-divider"></div>
              <span class="sv-topbar-title">Klima og bærekraft</span>
            </div>
            <div class="sv-topbar-right">
              <span class="sv-nickname-badge">Markus</span>
              <span class="sv-timer-badge" id="sv-timer-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="sv-timer-value" id="sv-timer-value"></span></span>
              <span class="sv-step-badge" id="sv-step-badge"><span class="badge-full">Steg 1 av 6</span><span class="badge-short">1/6</span></span>
            </div>
          </div>
          <div class="sv-body">
            <div class="sv-content disabled" id="sv-content">
              <!-- Selected statement -->
              <div class="sv-stmt-card sv-card-blue">Klimaendringene rammer fattige land hardest.</div>

              <!-- Vote -->
              <div class="sv-section">
                <div class="sv-section-label">Hva mener du?</div>
                <div class="sv-vote-row">
                  <button class="sv-vote-btn sv-vote-sant">Sant</button>
                  <button class="sv-vote-btn sv-vote-delvis">Delvis sant</button>
                  <button class="sv-vote-btn sv-vote-usant">Usant</button>
                </div>
              </div>

              <!-- Confidence -->
              <div class="sv-section">
                <div class="sv-section-label">Hvor sikker er du?</div>
                <div class="sv-confidence-row">
                  <button class="sv-confidence-btn">1</button>
                  <button class="sv-confidence-btn">2</button>
                  <button class="sv-confidence-btn">3</button>
                  <button class="sv-confidence-btn">4</button>
                  <button class="sv-confidence-btn">5</button>
                </div>
              </div>

              <!-- Reasoning -->
              <div class="sv-section">
                <div class="sv-section-label">Begrunn svaret ditt</div>
                <textarea class="sv-reasoning-box" placeholder="Skriv din begrunnelse her..."></textarea>
              </div>
            </div>
            <button class="sv-submit-btn" disabled>Send inn</button>
            <div class="sv-waiting" id="sv-waiting">
              <img src="../assets/Professoren.png" alt="Professoren" class="sv-waiting-professor">
              <div class="sv-waiting-text" id="sv-waiting-text">Venter på resten av klassen</div>
              <div class="sv-waiting-dots"><span></span><span></span><span></span></div>
            </div>
          </div>

          <!-- Mine svar floating button -->
          <button class="mine-svar-fab" id="mine-svar-fab" title="Mine svar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>

          <!-- Mine svar overlay -->
          <div class="mine-svar-overlay" id="mine-svar-overlay">
            <div class="mine-svar-panel">
              <div class="mine-svar-header">
                <span class="mine-svar-title">Mine svar</span>
                <button class="mine-svar-close" id="mine-svar-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
              </div>
              <div id="mine-svar-content"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── Read selected statement from URL params ──
    (function() {
      var params = new URLSearchParams(window.location.search);
      var stmtText = params.get('stmt');
      var stmtColor = params.get('color');
      if (stmtText) {
        document.querySelectorAll('.sv-stmt-card').forEach(function(card) { card.textContent = stmtText; });
      }
      if (stmtColor) {
        var colors = ['blue','yellow','orange','purple','red'];
        document.querySelectorAll('.sv-stmt-card').forEach(function(card) {
          colors.forEach(function(c) { card.classList.remove('sv-card-' + c); });
          card.classList.add('sv-card-' + stmtColor);
        });
      }
    })();

    var hasSubmitted = false;
    var localSubmitPending = false; // block parent relay while we control timing

    // ── Mine svar data (accessible from submit handlers) ──
    var myVotes = { r1: null, r2: null };

    // ── Check if submit should be enabled (vote + confidence selected) ──
    function checkSubmitReady() {
      var voteSelected = document.querySelector('.sv-vote-btn.selected');
      var confSelected = document.querySelector('.sv-confidence-btn.selected');
      var submitBtn = document.querySelector('.sv-submit-btn');
      if (submitBtn && !submitBtn.classList.contains('sent')) {
        submitBtn.disabled = !(voteSelected && confSelected);
      }
    }

    // Toggle vote buttons within each iPad screen independently
    document.querySelectorAll('.sv-vote-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var row = btn.closest('.sv-vote-row');
        row.querySelectorAll('.sv-vote-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        row.classList.add('has-selection');
        checkSubmitReady();
      });
    });

    // Toggle confidence buttons within each iPad screen independently
    document.querySelectorAll('.sv-confidence-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var row = btn.closest('.sv-confidence-row');
        row.querySelectorAll('.sv-confidence-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        checkSubmitReady();
      });
    });

    // ── Show waiting state ──
    function showWaitingState(text) {
      var content = document.getElementById('sv-content');
      var submitBtn = document.querySelector('.sv-submit-btn');
      var waiting = document.getElementById('sv-waiting');
      var waitingText = document.getElementById('sv-waiting-text');
      if (content) content.style.display = 'none';
      if (submitBtn) submitBtn.style.display = 'none';
      if (waitingText) waitingText.textContent = text;
      if (waiting) waiting.classList.add('visible');
    }

    // ── Helper: collect current vote data ──
    function collectVoteData(body) {
      var voteBtn = body.querySelector('.sv-vote-btn.selected');
      var confBtn = body.querySelector('.sv-confidence-btn.selected');
      var reasonBox = body.querySelector('.sv-reasoning-box');
      var vote = null;
      if (voteBtn) {
        if (voteBtn.classList.contains('sv-vote-sant')) vote = 'sant';
        else if (voteBtn.classList.contains('sv-vote-delvis')) vote = 'delvis';
        else if (voteBtn.classList.contains('sv-vote-usant')) vote = 'usant';
      }
      var conf = confBtn ? parseInt(confBtn.textContent) : null;
      var reason = reasonBox ? reasonBox.value.trim() : '';
      return { vote: vote, conf: conf, reason: reason };
    }

    // Submit button – show waiting state + send vote to parent
    document.querySelectorAll('.sv-submit-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var body = btn.closest('.sv-body');
        var data = collectVoteData(body);
        // Send to parent (demo orchestrator)
        if (data.vote && data.conf && window.parent !== window) {
          window.parent.postMessage({ type: 'fagprat-student-vote', vote: data.vote, conf: data.conf, reason: data.reason, round: 1 }, '*');
        }
        hasSubmitted = true;
        localSubmitPending = true;
        myVotes.r1 = { vote: data.vote, conf: data.conf, reason: data.reason };
        btn.textContent = 'Sendt!';
        btn.classList.add('sent');
        setTimeout(function() {
          showWaitingState('Venter på resten av klassen');
          setTimeout(function() { localSubmitPending = false; renderMineSvar(); }, 500);
        }, 500);
      });
    });

    // ── Timer sync from demo parent ──
    function formatTime(s) {
      var m = Math.floor(s / 60);
      var sec = s % 60;
      return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    }
    window.addEventListener('message', function(e) {
      if (!e.data || e.data.type !== 'fagprat-timer') return;
      var badge = document.getElementById('sv-timer-badge');
      var timerValue = document.getElementById('sv-timer-value');
      var stepBadge = document.getElementById('sv-step-badge');
      var content = document.getElementById('sv-content');
      if (e.data.action === 'start') {
        content.classList.remove('disabled');
        timerValue.textContent = formatTime(e.data.remaining);
        badge.classList.add('visible');
        stepBadge.style.display = 'none';
        // Hide Mine svar fab while voting is active
        var fabEl = document.getElementById('mine-svar-fab');
        if (fabEl) fabEl.style.display = 'none';
      } else if (e.data.action === 'tick') {
        timerValue.textContent = formatTime(e.data.remaining);
      } else if (e.data.action === 'finish') {
        badge.classList.remove('visible');
        stepBadge.style.display = '';
        // Auto-submit if vote + confidence selected but not yet submitted
        if (!hasSubmitted) {
          var body = document.querySelector('.sv-body');
          var voteBtn = body ? body.querySelector('.sv-vote-btn.selected') : null;
          var confBtn = body ? body.querySelector('.sv-confidence-btn.selected') : null;
          if (voteBtn && confBtn) {
            var data = collectVoteData(body);
            if (data.vote && data.conf && window.parent !== window) {
              window.parent.postMessage({ type: 'fagprat-student-vote', vote: data.vote, conf: data.conf, reason: data.reason, round: 1 }, '*');
            }
            hasSubmitted = true;
            localSubmitPending = true;
            myVotes.r1 = { vote: data.vote, conf: data.conf, reason: data.reason };
          }
        }
        // Timer finished — always show waiting state
        showWaitingState('Venter på læreren');
        setTimeout(function() { localSubmitPending = false; renderMineSvar(); }, 500);
      } else if (e.data.action === 'reset') {
        // Timer was stopped/reset by teacher — go back to voting state
        badge.classList.remove('visible');
        stepBadge.style.display = '';
        hasSubmitted = false;
        localSubmitPending = false;
        // Clear Mine svar data and hide fab
        myVotes.r1 = null;
        myVotes.r2 = null;
        renderMineSvar();
        // Restore voting UI
        content.style.display = '';
        content.classList.add('disabled');
        // Clear all selections
        content.querySelectorAll('.sv-vote-btn.selected').forEach(function(b) { b.classList.remove('selected'); });
        content.querySelectorAll('.sv-confidence-btn.selected').forEach(function(b) { b.classList.remove('selected'); });
        var reasonBox = content.querySelector('.sv-reasoning-box');
        if (reasonBox) reasonBox.value = '';
        var submitBtn = document.querySelector('.sv-submit-btn');
        if (submitBtn) {
          submitBtn.style.display = '';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Send inn';
          submitBtn.classList.remove('sent');
        }
        var waiting = document.getElementById('sv-waiting');
        if (waiting) waiting.classList.remove('visible');
      }
    });

    // ── Mine svar panel ──
    (function() {
      var fab = document.getElementById('mine-svar-fab');
      var overlay = document.getElementById('mine-svar-overlay');
      var closeBtn = document.getElementById('mine-svar-close');
      var contentEl = document.getElementById('mine-svar-content');

      function voteLabel(v) {
        if (v === 'sant') return 'Sant';
        if (v === 'delvis') return 'Delvis sant';
        if (v === 'usant') return 'Usant';
        return v;
      }

      function renderCol(label, data) {
        var html = '<div class="mine-svar-col">';
        html += '<div class="mine-svar-round-label">' + label + '</div>';
        if (data) {
          html += '<div class="mine-svar-row">';
          html += '<span class="mine-svar-vote-badge ' + data.vote + '">' + voteLabel(data.vote) + '</span>';
          html += '<span class="mine-svar-conf-badge cc-' + data.conf + '">' + data.conf + '</span>';
          html += '</div>';
        } else {
          html += '<div class="mine-svar-ghost-row">';
          html += '<span class="mine-svar-ghost-badge">Usant</span>';
          html += '<span class="mine-svar-ghost-circle"></span>';
          html += '</div>';
        }
        html += '</div>';
        return html;
      }

      // Expose render globally so submit handlers can call it
      window.renderMineSvar = function() {
        if (!myVotes.r1 && !myVotes.r2) {
          fab.style.display = 'none';
          return;
        }
        fab.style.display = 'flex';
        var html = '<div class="mine-svar-body">';
        html += '<div class="mine-svar-columns">';
        html += renderCol('Runde 1', myVotes.r1);
        html += renderCol('Runde 2', myVotes.r2);
        html += '</div>';
        if (myVotes.r1 && myVotes.r1.reason) {
          html += '<div class="mine-svar-reason">' + myVotes.r1.reason + '</div>';
        }
        html += '</div>';
        contentEl.innerHTML = html;
      };

      fab.addEventListener('click', function() {
        overlay.classList.add('visible');
      });
      closeBtn.addEventListener('click', function() {
        overlay.classList.remove('visible');
      });
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.classList.remove('visible');
      });

      // Listen for vote data from parent (e.g. when navigating back to this step)
      window.addEventListener('message', function(e) {
        if (!e.data) return;
        if (e.data.type === 'fagprat-my-votes') {
          if (localSubmitPending) return; // ignore parent relay — we control timing locally
          if (e.data.r1) myVotes.r1 = e.data.r1;
          if (e.data.r2) myVotes.r2 = e.data.r2;
          renderMineSvar();
        }
      });

      // Request vote data from parent on init
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'fagprat-request-my-votes' }, '*');
      }
    })();
  </script>

</body>
</html>
