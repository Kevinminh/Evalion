<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Første stemmerunde – Variant D: Lærerpanel</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-family-body);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       TOP BAR
       ══════════════════════════════════════ */
    .top-bar {
      position: relative;
      height: 80px; min-height: 80px;
      background: var(--color-neutral-0);
      border-bottom: 1.5px solid var(--color-neutral-200);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-8);
      z-index: var(--z-sticky);
    }
    .top-bar-left { display: flex; align-items: center; gap: var(--space-4); }
    .top-bar-logo { height: 48px; object-fit: contain; }
    .top-bar-divider { width: 1.5px; height: 32px; background: var(--color-neutral-300); }
    .top-bar-title { font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--color-text-primary); }
    .btn-back {
      display: flex; align-items: center; gap: var(--space-1-5);
      align-self: flex-start;
      padding: var(--space-2) var(--space-4);
      background: none; border: 1.5px solid var(--color-neutral-300);
      border-radius: var(--radius-full);
      font-family: var(--font-family-body); font-size: var(--text-sm); font-weight: var(--font-semibold);
      color: var(--color-text-secondary); cursor: pointer;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    .btn-back:hover {
      border-color: var(--color-neutral-400);
      color: var(--color-text-primary);
      background: rgba(255,255,255,0.6);
    }
    .btn-back svg { width: 16px; height: 16px; }

    .top-bar-right { display: flex; align-items: center; gap: var(--space-4); }

    /* Top bar timer (centered when panel is hidden) */
    .top-bar-center {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
    }
    .topbar-timer {
      display: none; align-items: center; gap: var(--space-3);
      background: var(--color-usant-bg);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
    }
    .topbar-timer.visible { display: flex; }
    .topbar-timer svg { width: 20px; height: 20px; color: var(--color-error); }
    .topbar-timer-value {
      font-family: var(--font-family-mono);
      font-size: var(--text-xl); font-weight: var(--font-bold);
      color: var(--color-text-primary); line-height: 1;
    }

    /* ── Top-bar recording button ── */
    .btn-record-topbar {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: var(--color-neutral-100);
      border: 1.5px solid var(--color-neutral-300);
      border-radius: var(--radius-full);
      font-family: var(--font-family-body);
      font-size: var(--text-sm); font-weight: var(--font-bold);
      color: var(--color-neutral-600);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .btn-record-topbar svg { width: 18px; height: 18px; }
    .btn-record-topbar.disabled {
      opacity: 0.35; cursor: default; pointer-events: none;
    }

    .btn-end-activity {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2-5) var(--space-5);
      background: var(--color-error); color: var(--color-text-inverse);
      border: none; border-radius: var(--radius-full);
      font-family: var(--font-family-body); font-size: var(--text-sm); font-weight: var(--font-bold);
      cursor: pointer; transition: background var(--transition-fast);
    }
    .btn-end-activity:hover { background: #D32F2F; }
    .btn-end-activity svg { width: 18px; height: 18px; }

    /* ══════════════════════════════════════
       MAIN LAYOUT
       ══════════════════════════════════════ */
    .main-layout {
      flex: 1; display: flex; min-height: 0; overflow: hidden;
    }

    /* ── Student-facing area (left) ── */
    .student-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center;
      padding: var(--space-5) var(--space-8);
      min-height: 0;
    }

    .student-area-top {
      display: flex; justify-content: space-between; align-items: center; width: 100%;
    }
    .vote-count {
      display: none; align-items: center; gap: var(--space-2);
      font-size: var(--text-sm); font-weight: var(--font-semibold);
      color: var(--color-text-secondary);
      padding: var(--space-2) var(--space-4);
      border: 1.5px solid var(--color-neutral-300);
      border-radius: var(--radius-full);
    }
    .vote-count.visible { display: flex; }
    .vote-count svg { width: 16px; height: 16px; color: var(--color-primary-400); }

    /* Push statement up, professor down */
    .statement-spacer { flex: 1; }
    .professor-spacer { flex: 2; }
    .bottom-spacer { flex: 1.5; }

    /* Statement Card */
    .statement-card {
      width: 100%; max-width: 760px;
      background: linear-gradient(135deg, #E3F1FC, #D6ECFA);
      border-radius: var(--radius-2xl);
      border: 2px solid #B8DAF0;
      padding: var(--space-8) var(--space-10);
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .statement-text {
      font-size: var(--text-2xl); font-weight: var(--font-bold);
      line-height: var(--leading-relaxed); color: #2C5F8A;
    }

    /* Professor row */
    .professor-row {
      width: 100%; max-width: 640px;
      display: flex; align-items: center; gap: var(--space-4);
    }
    .professor-img {
      width: 96px; height: 96px; border-radius: var(--radius-full);
      object-fit: cover; flex-shrink: 0;
      border: 3px solid var(--color-primary-200); background: var(--color-bg-tertiary);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .professor-bubble {
      flex: 1;
      background: var(--color-neutral-0); border-radius: var(--radius-2xl);
      animation: fadeInUp 0.5s ease 0.2s both;
      box-shadow: var(--shadow-md); border: 1.5px solid var(--color-neutral-200);
      padding: var(--space-5) var(--space-6); position: relative;
      font-size: var(--text-xl); font-weight: var(--font-medium);
      line-height: var(--leading-relaxed); color: var(--color-text-primary);
      text-align: center;
    }
    .professor-bubble::before {
      content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 10px solid transparent; border-bottom: 10px solid transparent;
      border-right: 10px solid var(--color-neutral-0);
      filter: drop-shadow(-2px 0 1px rgba(0,0,0,0.04));
    }

    /* ══════════════════════════════════════
       TEACHER PANEL
       ══════════════════════════════════════ */
    .teacher-panel-wrap {
      position: relative;
      display: flex;
      flex-shrink: 0;
    }

    /* Toggle button – outside panel */
    .panel-toggle {
      position: absolute;
      top: 50%; left: 0; transform: translate(-100%, -50%);
      width: 28px; height: 64px;
      background: var(--color-neutral-50);
      border: 1.5px solid var(--color-neutral-200);
      border-right: none;
      border-radius: 14px 0 0 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 20;
      transition: all 0.2s ease;
      color: var(--color-primary-500);
    }
    .panel-toggle:hover {
      background: var(--color-neutral-200);
      color: var(--color-text-primary);
    }
    .panel-toggle svg {
      width: 16px; height: 16px;
      transition: transform 0.3s ease;
    }
    .panel-toggle.flipped svg {
      transform: rotate(180deg);
    }

    .teacher-panel {
      width: 340px;
      background: var(--color-neutral-50);
      border-left: 1.5px solid var(--color-neutral-200);
      display: flex; flex-direction: column;
      transition: width 0.35s ease, opacity 0.25s ease;
      overflow: hidden;
    }
    .teacher-panel.collapsed {
      width: 0;
      opacity: 0; pointer-events: none;
    }

    /* Panel section labels */
    .panel-section-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      color: var(--color-text-secondary); text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 var(--space-1);
      white-space: nowrap;
    }

    /* Panel body */
    .panel-body {
      flex: 1; display: flex; flex-direction: column;
      padding: var(--space-4) var(--space-4);
      gap: var(--space-3);
      justify-content: center;
    }

    /* ── Timer Card ── */
    .timer-card {
      background: var(--color-neutral-0);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-md);
      padding: var(--space-4);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      gap: var(--space-2-5);
      min-height: 210px;
    }
    .timer-card-header {
      display: flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-xs); font-weight: var(--font-bold);
      color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em;
    }
    .timer-card-header svg { width: 16px; height: 16px; color: var(--color-primary-400); }
    .timer-display {
      font-family: var(--font-family-mono);
      font-size: 48px; font-weight: var(--font-bold);
      color: var(--color-text-primary); line-height: 1;
      letter-spacing: 2px;
    }
    /* Running state: compact, fixed height */
    .timer-card.running {
      padding: var(--space-3);
      min-height: auto;
      height: 120px;
      gap: var(--space-2);
    }
    .timer-card.running .timer-display {
      font-size: 36px;
    }
    .timer-card.running .timer-display.urgent {
      color: var(--color-error);
    }
    .timer-card.running .timer-card-header {
      display: none;
    }

    /* Start button */
    .btn-start-timer {
      width: 100%; padding: var(--space-2-5);
      background: var(--color-sant); color: white;
      border: none; border-radius: var(--radius-xl);
      font-family: var(--font-family-body); font-size: var(--text-sm); font-weight: var(--font-bold);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: var(--space-2);
      transition: all var(--transition-fast);
      box-shadow: 0 3px 0 var(--color-sant-hover);
    }
    .btn-start-timer:hover { background: var(--color-sant-hover); }
    .btn-start-timer:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--color-sant-hover); }
    .btn-start-timer svg { width: 18px; height: 18px; }

    /* Running buttons (pause + stop) */
    .timer-running-btns {
      display: none; width: 100%; gap: var(--space-2);
    }
    .timer-running-btns.visible { display: flex; }
    .btn-pause, .btn-stop {
      flex: 1; padding: var(--space-2-5);
      border: none; border-radius: var(--radius-xl);
      font-family: var(--font-family-body); font-size: var(--text-sm); font-weight: var(--font-bold);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: var(--space-1-5);
      transition: all var(--transition-fast);
    }
    .btn-pause {
      background: var(--color-delvis); color: white;
      box-shadow: 0 3px 0 var(--color-delvis-hover);
    }
    .btn-pause:hover { background: var(--color-delvis-hover); }
    .btn-pause:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--color-delvis-hover); }
    .btn-stop {
      background: var(--color-error); color: white;
      box-shadow: 0 3px 0 #D32F2F;
    }
    .btn-stop:hover { background: #D32F2F; }
    .btn-stop:active { transform: translateY(2px); box-shadow: 0 1px 0 #D32F2F; }
    .btn-pause svg, .btn-stop svg { width: 16px; height: 16px; }

    /* Next step button (visible when timer finishes) */
    .btn-next-step {
      display: none; width: 100%; padding: var(--space-4);
      background: var(--color-primary-500);
      color: white; border: none; border-radius: var(--radius-xl);
      font-family: var(--font-family-body); font-size: var(--text-sm); font-weight: var(--font-bold);
      cursor: pointer; align-items: center; justify-content: center; gap: var(--space-2);
      transition: all var(--transition-fast);
      box-shadow: 0 3px 0 var(--color-primary-700);
    }
    .btn-next-step.visible { display: flex; }
    .btn-next-step:hover { opacity: 0.9; }
    .btn-next-step:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--color-primary-700); }
    .btn-next-step svg { width: 18px; height: 18px; }

    /* Finished state: show timer setup again */
    .timer-card.finished .timer-card-header {
      display: none;
    }

    /* Slider & presets */
    .timer-setup { width: 100%; display: flex; flex-direction: column; gap: var(--space-2-5); align-items: center; }
    .timer-setup.hidden { display: none; }

    .timer-slider-wrap { width: 100%; }
    .timer-range {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 8px; border-radius: var(--radius-full);
      background: var(--color-neutral-200);
      outline: none; cursor: pointer;
    }
    .timer-range::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--color-primary-500);
      border: 3px solid var(--color-neutral-0);
      box-shadow: 0 2px 8px rgba(108,63,197,0.35); cursor: pointer;
    }
    .timer-range::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--color-primary-500);
      border: 3px solid var(--color-neutral-0);
      box-shadow: 0 2px 8px rgba(108,63,197,0.35); cursor: pointer;
    }

    .timer-presets { display: flex; gap: var(--space-2); width: 100%; justify-content: center; }
    .preset-pill {
      flex: 1; text-align: center;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      border: 1.5px solid var(--color-neutral-300);
      background: var(--color-neutral-0);
      font-family: var(--font-family-body); font-size: var(--text-sm); font-weight: var(--font-semibold);
      color: var(--color-text-secondary); cursor: pointer; transition: all var(--transition-fast);
    }
    .preset-pill:hover {
      border-color: var(--color-primary-300);
      background: var(--color-primary-50);
      color: var(--color-primary-500);
    }
    .preset-pill.selected {
      background: var(--color-primary-50);
      border-color: var(--color-primary-400);
      color: var(--color-primary-600);
      font-weight: var(--font-bold);
    }

    /* ══════════════════════════════════════
       BOTTOM NAV
       ══════════════════════════════════════ */
    .bottom-nav {
      height: 100px; min-height: 100px;
      background: var(--color-neutral-0);
      border-top: 1.5px solid var(--color-neutral-200);
      display: flex; align-items: center; justify-content: center;
      padding: 0 var(--space-6);
    }
    .step-nav {
      display: flex; align-items: stretch;
      width: 100%;
      gap: var(--space-2);
    }
    .step-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      gap: var(--space-1-5);
      padding: var(--space-3) var(--space-2);
      border-radius: var(--radius-xl);
      cursor: pointer; transition: all 0.2s ease;
      text-align: center;
    }
    .step-item:hover:not(.active):not(.completed) { background: var(--color-neutral-100); }
    .step-num {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: var(--font-extrabold);
      background: var(--color-neutral-200); color: var(--color-neutral-500); flex-shrink: 0;
    }
    .step-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      color: var(--color-text-tertiary); line-height: 1.2;
    }

    .step-item.completed .step-num { background: var(--color-sant); color: white; }
    .step-item.completed .step-label { color: var(--color-text-secondary); }
    .step-item.active {
      background: var(--color-primary-100);
      border-radius: var(--radius-xl);
    }
    .step-item.active .step-num { background: var(--color-primary-500); color: white; }
    .step-item.active .step-label { color: var(--color-primary-700); }

  </style>
  <script>if(window.parent!==window)window.parent.postMessage({type:'fagprat-steg-loaded',steg:1},'*');</script>
</head>
<body>

  <!-- ═══════════ TOP BAR ═══════════ -->
  <header class="top-bar">
    <div class="top-bar-left">
      <img src="assets/FagPrat - logo.png" alt="FagPrat" class="top-bar-logo">
      <div class="top-bar-divider"></div>
      <span class="top-bar-title">Klima og bærekraft</span>
    </div>
    <div class="top-bar-center">
      <div class="topbar-timer" id="topbar-timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="topbar-timer-value" id="topbar-timer-value">01:00</span>
      </div>
    </div>
    <div class="top-bar-right">
      <button class="btn-record-topbar disabled" title="Opptak er tilgjengelig i steg 2 og 4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span class="record-label">Opptak</span>
      </button>
      <button class="btn-end-activity">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Avslutt aktiviteten
      </button>
    </div>
  </header>

  <!-- ═══════════ MAIN LAYOUT ═══════════ -->
  <div class="main-layout">

    <!-- Student-facing area -->
    <div class="student-area">
      <div class="student-area-top">
        <button class="btn-back" onclick="window.location.href='fagprat-steg0.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Alle påstander
        </button>
        <div class="vote-count" id="vote-count">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span id="vote-count-text">0 / 22 har stemt</span>
        </div>
      </div>
      <div class="statement-spacer"></div>

      <!-- Statement – colored, no label -->
      <div class="statement-card">
        <div class="statement-text">Klimaendringene rammer fattige land hardest.</div>
      </div>

      <div class="professor-spacer"></div>

      <!-- Professor -->
      <div class="professor-row">
        <img src="assets/Professoren.png" alt="Professoren" class="professor-img">
        <div class="professor-bubble">
          Stem uten å avsløre for de andre, og skriv gjerne ned hva du tenker. Hvor sikker er du?
        </div>
      </div>

      <div class="bottom-spacer"></div>
    </div>

    <!-- Teacher Panel -->
    <div class="teacher-panel-wrap">
      <button class="panel-toggle" id="panel-toggle" title="Skjul/vis lærerpanel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <aside class="teacher-panel" id="teacher-panel">

        <div class="panel-body">

          <div class="panel-section-label">Nedtelling</div>

          <!-- Timer Card -->
          <div class="timer-card" id="timer-card">
            <div class="timer-display" id="timer-display">01:00</div>

            <!-- Before start: start button + slider + presets -->
            <button class="btn-start-timer" id="btn-start">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <div class="timer-setup" id="timer-setup">
              <div class="timer-slider-wrap">
                <input type="range" class="timer-range" id="timer-range" min="10" max="180" value="60" step="5">
              </div>
              <div class="timer-presets">
                <button class="preset-pill">30s</button>
                <button class="preset-pill selected">1m</button>
                <button class="preset-pill">2m</button>
              </div>
            </div>

            <!-- After start: pause + stop buttons -->
            <div class="timer-running-btns" id="timer-running-btns">
              <button class="btn-pause" id="btn-pause">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                Pause
              </button>
              <button class="btn-stop" id="btn-stop">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                Stopp
              </button>
            </div>

          </div>

          <!-- After timer finishes: go to discussion button -->
          <button class="btn-next-step" id="btn-next-step">
            Gå til diskusjon
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>

        </div>
      </aside>
    </div>

  </div>


  <!-- ═══════════ BOTTOM NAV ═══════════ -->
  <nav class="bottom-nav">
    <div class="step-nav">
      <div class="step-item active" onclick="window.location.href='fagprat-steg1.html'">
        <span class="step-num">1</span>
        <span class="step-label">Første stemmerunde</span>
      </div>
      <div class="step-item" onclick="window.location.href='fagprat-steg2.html'">
        <span class="step-num">2</span>
        <span class="step-label">Diskusjon</span>
      </div>
      <div class="step-item" onclick="window.location.href='fagprat-steg3.html'">
        <span class="step-num">3</span>
        <span class="step-label">Andre stemmerunde</span>
      </div>
      <div class="step-item" onclick="window.location.href='fagprat-steg4.html'">
        <span class="step-num">4</span>
        <span class="step-label">Vise fasit</span>
      </div>
      <div class="step-item" onclick="window.location.href='fagprat-steg5.html'">
        <span class="step-num">5</span>
        <span class="step-label">Professorens forklaring</span>
      </div>
      <div class="step-item" onclick="window.location.href='fagprat-steg6.html'">
        <span class="step-num">6</span>
        <span class="step-label">Egenvurdering</span>
      </div>
    </div>
  </nav>

  <script src="fagprat-data.js"></script>
  <script>
    // ── Dynamic data loading ──
    (function() {
      var fp = getCurrentFagPrat();
      var stmt = getCurrentStatement();
      if (fp) {
        var titleEl = document.querySelector('.top-bar-title');
        if (titleEl) titleEl.textContent = fp.title;
      }
      if (stmt) {
        var stmtText = document.querySelector('.statement-text');
        if (stmtText) stmtText.textContent = stmt.text;
        // Apply statement color
        var colorMap = {
          blue:   { bg1: '#E3F1FC', bg2: '#D6ECFA', border: '#B8DAF0', text: '#2C5F8A' },
          orange: { bg1: '#FFF3E0', bg2: '#FFE0B2', border: '#FFB74D', text: '#BF360C' },
          yellow: { bg1: '#FFF8E1', bg2: '#FFF3CD', border: '#FFD54F', text: '#5D4037' },
          purple: { bg1: '#F3E5F5', bg2: '#E8D5F0', border: '#CE93D8', text: '#6A1B9A' },
          red:    { bg1: '#FFEBEE', bg2: '#FFCDD2', border: '#EF9A9A', text: '#B71C1C' }
        };
        var c = colorMap[stmt.color];
        if (c) {
          var card = document.querySelector('.statement-card');
          if (card) { card.style.background = 'linear-gradient(135deg, ' + c.bg1 + ', ' + c.bg2 + ')'; card.style.borderColor = c.border; }
          if (stmtText) stmtText.style.color = c.text;
        }
      }
    })();

    // ── End activity ──
    document.querySelector('.btn-end-activity').addEventListener('click', function() {
      window.location.href = 'min-samling.html';
    });

    // Elements
    const range = document.getElementById('timer-range');
    const display = document.getElementById('timer-display');
    const topbarTimer = document.getElementById('topbar-timer');
    const topbarValue = document.getElementById('topbar-timer-value');
    const presets = document.querySelectorAll('.preset-pill');
    const btnStart = document.getElementById('btn-start');
    const timerSetup = document.getElementById('timer-setup');
    const runningBtns = document.getElementById('timer-running-btns');
    const btnPause = document.getElementById('btn-pause');
    const btnStop = document.getElementById('btn-stop');
    const btnNextStep = document.getElementById('btn-next-step');
    const timerCard = document.getElementById('timer-card');
    const voteCountEl = document.getElementById('vote-count');
    const voteCountText = document.getElementById('vote-count-text');
    const panel = document.getElementById('teacher-panel');
    const toggleBtn = document.getElementById('panel-toggle');

    let totalSeconds = 60;
    let remainingSeconds = 60;
    let timerInterval = null;
    let isRunning = false;
    let isPaused = false;
    let hasRun = false; // track if timer has been run before

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function updateDisplays() {
      const text = formatTime(remainingSeconds);
      display.textContent = text;
      topbarValue.textContent = text;
      const pct = ((parseInt(range.value) - 10) / (180 - 10)) * 100;
      range.style.background = `linear-gradient(90deg, var(--color-primary-300) 0%, var(--color-primary-300) ${pct}%, var(--color-neutral-200) ${pct}%)`;
      if (isRunning && remainingSeconds <= 10) {
        display.classList.add('urgent');
      } else {
        display.classList.remove('urgent');
      }
    }

    // Slider
    range.addEventListener('input', () => {
      totalSeconds = parseInt(range.value);
      remainingSeconds = totalSeconds;
      presets.forEach(p => p.classList.remove('selected'));
      updateDisplays();
    });

    // Presets
    presets.forEach(btn => {
      btn.addEventListener('click', () => {
        presets.forEach(p => p.classList.remove('selected'));
        btn.classList.add('selected');
        const text = btn.textContent.trim();
        let secs = 60;
        if (text.includes('30')) secs = 30;
        else if (text.includes('2')) secs = 120;
        totalSeconds = secs;
        remainingSeconds = secs;
        range.value = secs;
        updateDisplays();
      });
    });

    // Start
    btnStart.addEventListener('click', () => {
      // Warn if timer has already been run
      if (hasRun) {
        if (!confirm('Eksisterende data vil bli erstattet. Vil du starte på nytt?')) return;
      }

      hasRun = true;
      isRunning = true;
      isPaused = false;
      remainingSeconds = totalSeconds;

      // Switch UI
      btnStart.style.display = 'none';
      timerSetup.classList.add('hidden');
      runningBtns.classList.add('visible');
      btnNextStep.classList.remove('visible');
      timerCard.classList.add('running');
      timerCard.classList.remove('finished');

      // Show vote count on canvas
      voteCountEl.classList.add('visible');
      voteCountText.textContent = '0 / 22 har stemt';

      // Auto-collapse panel
      if (!panel.classList.contains('collapsed')) {
        panel.classList.add('collapsed');
        toggleBtn.classList.add('flipped');
        localStorage.setItem('fagprat-panel-collapsed', '1');
      }

      // Start countdown
      updateDisplays();
      updateTopbarTimer();
      simulateVotes();
      // Notify demo parent that timer started
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'fagprat-timer', action: 'start', remaining: remainingSeconds }, '*');
      }
      timerInterval = setInterval(() => {
        if (!isPaused) {
          remainingSeconds--;
          updateDisplays();
          // Sync timer to demo parent
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'fagprat-timer', action: 'tick', remaining: remainingSeconds }, '*');
          }
          if (remainingSeconds <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            if (window.parent !== window) {
              window.parent.postMessage({ type: 'fagprat-timer', action: 'finish' }, '*');
            }
            finishTimer();
          }
        }
      }, 1000);
    });

    // Pause / Resume
    btnPause.addEventListener('click', () => {
      isPaused = !isPaused;
      btnPause.innerHTML = isPaused
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Fortsett'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg> Pause';
    });

    // Stop
    btnStop.addEventListener('click', () => {
      stopTimer();
    });

    // Timer finished naturally — restore setup + show "Gå til diskusjon"
    function finishTimer() {
      isRunning = false;
      isPaused = false;
      display.classList.remove('urgent');

      // Restore timer setup UI
      runningBtns.classList.remove('visible');
      timerCard.classList.remove('running');
      timerCard.classList.add('finished');
      remainingSeconds = totalSeconds;
      updateDisplays();

      // Show start button + setup again
      btnStart.style.display = 'flex';
      timerSetup.classList.remove('hidden');

      // Show "Gå til diskusjon" button
      btnNextStep.classList.add('visible');

      updateTopbarTimer();
    }

    // Manual stop (reset everything)
    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      isPaused = false;

      remainingSeconds = totalSeconds;
      btnStart.style.display = 'flex';
      timerSetup.classList.remove('hidden');
      runningBtns.classList.remove('visible');
      btnNextStep.classList.remove('visible');
      timerCard.classList.remove('running');
      timerCard.classList.remove('finished');
      display.classList.remove('urgent');
      btnPause.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg> Pause';

      updateDisplays();
      updateTopbarTimer();

      // Notify student view and statistics that the timer was stopped (keep current state)
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'fagprat-timer', action: 'stop' }, '*');
      }
    }

    // Next step button
    btnNextStep.addEventListener('click', () => {
      window.location.href = 'fagprat-steg2.html';
    });

    // Simulate votes trickling in — updates canvas vote count
    let studentVoteReceived = false;
    function simulateVotes() {
      // Synced with statistikk.html trickle-in easing
      // 22 total: 21 auto-trickle + 1 iPad user (Markus)
      const total = 22;
      const autoTotal = 21;
      const dur = totalSeconds;
      studentVoteReceived = false;
      let elapsed = 0;
      let autoCount = 0;
      const voteInterval = setInterval(() => {
        if (!isRunning) { clearInterval(voteInterval); return; }
        if (isPaused) return;
        elapsed++;
        var progress = elapsed / dur;
        if (progress > 1) progress = 1;
        var eased = progress < 0.1 ? progress * 2
                  : progress < 0.8 ? 0.2 + (progress - 0.1) * (0.7 / 0.7)
                  : 0.9 + (progress - 0.8) * (0.1 / 0.2);
        autoCount = Math.min(Math.round(eased * autoTotal), autoTotal);
        var displayed = autoCount + (studentVoteReceived ? 1 : 0);
        voteCountText.textContent = displayed + ' / ' + total + ' har stemt';
      }, 1000);
    }
    // Listen for iPad student vote
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'fagprat-student-vote') {
        studentVoteReceived = true;
        // Immediately update display
        var current = voteCountText.textContent.match(/(\d+)/);
        if (current) {
          var num = parseInt(current[1]) + 1;
          voteCountText.textContent = num + ' / 22 har stemt';
        }
      }
    });

    // Panel toggle
    function togglePanel() {
      panel.classList.toggle('collapsed');
      toggleBtn.classList.toggle('flipped');
      localStorage.setItem('fagprat-panel-collapsed', panel.classList.contains('collapsed') ? '1' : '0');
      updateTopbarTimer();
    }

    function updateTopbarTimer() {
      if (panel.classList.contains('collapsed') && isRunning) {
        topbarTimer.classList.add('visible');
      } else {
        topbarTimer.classList.remove('visible');
      }
    }

    toggleBtn.addEventListener('click', togglePanel);

    // Steg 1: Panel should end up OPEN
    // If previous step left it collapsed, animate it open
    if (localStorage.getItem('fagprat-panel-collapsed') === '1') {
      panel.style.transition = 'none';
      panel.classList.add('collapsed');
      toggleBtn.classList.add('flipped');
      setTimeout(function() {
        panel.style.transition = '';
        panel.classList.remove('collapsed');
        toggleBtn.classList.remove('flipped');
        localStorage.setItem('fagprat-panel-collapsed', '0');
      }, 30);
    } else {
      panel.classList.remove('collapsed');
      toggleBtn.classList.remove('flipped');
      localStorage.setItem('fagprat-panel-collapsed', '0');
    }

    // Init
    updateDisplays();

  </script>

</body>
