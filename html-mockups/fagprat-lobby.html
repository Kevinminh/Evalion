<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FagPrat Lobby | Evalion</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family-body);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
       TOP BAR
       ══════════════════════════════════════════ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--color-neutral-0);
      border-bottom: 1.5px solid var(--color-neutral-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-8);
      z-index: 100;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .top-bar-logo {
      height: 48px;
      object-fit: contain;
    }
    .top-bar-divider {
      width: 1.5px;
      height: 28px;
      background: var(--color-neutral-200);
    }
    .top-bar-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .btn-start, .btn-groups {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      font-family: var(--font-family-body);
      border-radius: var(--radius-xl);
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .btn-start {
      background: var(--color-sant);
      color: white;
      box-shadow: 0 3px 0 #2E7D32;
    }
    .btn-start:hover {
      background: var(--color-sant-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #2E7D32;
    }
    .btn-start:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #2E7D32;
    }
    .btn-groups {
      background: var(--color-primary-500);
      color: white;
      box-shadow: 0 3px 0 var(--color-primary-700);
    }
    .btn-groups:hover {
      background: var(--color-primary-600);
      transform: translateY(-1px);
      box-shadow: 0 4px 0 var(--color-primary-700);
    }
    .btn-groups:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 var(--color-primary-700);
    }
    .btn-groups svg {
      width: 18px;
      height: 18px;
    }

    /* ══════════════════════════════════════════
       LOBBY CANVAS
       ══════════════════════════════════════════ */
    .lobby-canvas {
      margin-top: 80px;
      flex: 1;
      display: flex;
      height: calc(100vh - 80px);
      overflow: hidden;
    }

    /* ── Left Panel: Join Info ── */
    .join-panel {
      width: 38%;
      min-width: 360px;
      max-width: 480px;
      background: var(--color-neutral-0);
      border: 1.5px solid var(--color-neutral-200);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6) var(--space-8);
      gap: var(--space-3);
      margin: var(--space-4);
      align-self: stretch;
      overflow: hidden;
    }

    .evalion-logo {
      height: 88px;
      object-fit: contain;
    }

    .join-url {
      font-size: var(--text-base);
      color: var(--color-text-tertiary);
      letter-spacing: 0.02em;
    }

    .join-label {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--color-text-secondary);
    }

    .game-code-box {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2.5px solid var(--color-primary-300);
      border-radius: var(--radius-xl);
      padding: var(--space-5) var(--space-10);
      background: var(--color-primary-50);
    }
    .game-code {
      font-family: var(--font-family-mono);
      font-size: 2.5rem;
      font-weight: var(--font-bold);
      letter-spacing: 0.25em;
      color: var(--color-primary-600);
    }

    .scan-label {
      font-size: var(--text-base);
      color: var(--color-text-tertiary);
    }

    .qr-placeholder {
      width: 130px;
      height: 130px;
      border: 2px dashed var(--color-neutral-300);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-placeholder svg {
      width: 70px;
      height: 70px;
      color: var(--color-neutral-400);
    }

    /* ── Right Panel: Students ── */
    .students-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .students-area {
      flex: 1;
      padding: var(--space-6);
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: var(--space-3);
      overflow-y: auto;
      min-height: 0;
    }

    /* ── Grouped view ── */
    .students-area.grouped {
      flex-wrap: wrap;
      gap: var(--space-4);
      align-content: flex-start;
    }
    .group-column {
      width: 180px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      animation: fadeInGroup 0.4s ease both;
    }
    .group-column:nth-child(1) { animation-delay: 0s; }
    .group-column:nth-child(2) { animation-delay: 0.08s; }
    .group-column:nth-child(3) { animation-delay: 0.16s; }
    .group-column:nth-child(4) { animation-delay: 0.24s; }
    .group-column:nth-child(5) { animation-delay: 0.32s; }
    .group-column:nth-child(6) { animation-delay: 0.40s; }
    .group-column:nth-child(7) { animation-delay: 0.48s; }
    .group-column:nth-child(8) { animation-delay: 0.56s; }

    @keyframes fadeInGroup {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .group-label {
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-tertiary);
      padding: 0 var(--space-1);
      margin-bottom: var(--space-1);
    }
    .group-cards {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      background: var(--color-neutral-0);
      border: 1.5px solid var(--color-neutral-200);
      border-radius: var(--radius-xl);
      padding: var(--space-3);
    }

    .student-card {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-neutral-0);
      border: 1.5px solid var(--color-neutral-200);
      border-radius: var(--radius-xl);
      padding: var(--space-2) var(--space-2) var(--space-2) var(--space-2);
      box-shadow: var(--shadow-xs);
      animation: cardIn 0.3s ease;
      height: fit-content;
    }

    /* In grouped view, cards are simpler (inside group container) */
    .group-cards .student-card {
      border: none;
      box-shadow: none;
      padding: var(--space-1-5) var(--space-2);
      animation: none;
    }

    .student-remove {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--color-neutral-400);
      cursor: pointer;
      border-radius: var(--radius-full);
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      transition: all var(--transition-fast);
      margin-left: var(--space-1);
    }
    .student-remove:hover {
      background: var(--color-usant-bg);
      color: var(--color-usant);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.9) translateY(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .student-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      color: white;
      flex-shrink: 0;
    }
    .student-avatar.purple { background: var(--color-primary-400); }
    .student-avatar.teal   { background: var(--color-secondary-400); }
    .student-avatar.pink   { background: var(--color-accent-400); }
    .student-avatar.green  { background: var(--color-sant); }
    .student-avatar.orange { background: var(--color-delvis); }

    .student-name {
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }

    /* ── Waiting + count footer ── */
    .students-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-6);
      flex-shrink: 0;
    }

    .waiting-text {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
    }

    /* dotPulse animation */
    .waiting-dots {
      display: inline-flex;
      gap: 4px;
      margin-left: var(--space-1);
    }
    .waiting-dots span {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--color-primary-300);
      border-radius: var(--radius-full);
      animation: dotPulse 1.4s infinite ease-in-out both;
    }
    .waiting-dots span:nth-child(1) { animation-delay: -0.32s; }
    .waiting-dots span:nth-child(2) { animation-delay: -0.16s; }
    .waiting-dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .student-count {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      color: var(--color-text-tertiary);
    }
    .student-count svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <!-- ═══════════ TOP BAR ═══════════ -->
  <header class="top-bar">
    <div class="top-bar-left">
      <img class="top-bar-logo" src="../Logoer og professoren/FagPrat - logo.png" alt="FagPrat">
      <div class="top-bar-divider"></div>
      <span class="top-bar-title">Newtons lover</span>
    </div>
    <div class="top-bar-right">
      <button class="btn-groups" id="btn-groups" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Opprett grupper
      </button>
      <button class="btn-start" id="btn-start">Start aktiviteten</button>
    </div>
  </header>

  <!-- ═══════════ LOBBY CANVAS ═══════════ -->
  <main class="lobby-canvas">

    <!-- Left: Join Info Panel -->
    <div class="join-panel">
      <img class="evalion-logo" src="../Logoer og professoren/Evalion logo.png" alt="Evalion">

      <span class="join-url">www.evalion.no/delta</span>
      <span class="join-label">Skriv inn koden for å bli med:</span>

      <div class="game-code-box">
        <span class="game-code">UBD2TS</span>
      </div>

      <span class="scan-label">Eller skann</span>
      <div class="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="3" height="3"/>
          <line x1="21" y1="14" x2="21" y2="17"/>
          <line x1="14" y1="21" x2="17" y2="21"/>
          <line x1="21" y1="21" x2="21" y2="21.01"/>
        </svg>
      </div>
    </div>

    <!-- Right: Students Panel -->
    <div class="students-panel">
      <div class="students-area" id="students-area">
        <div class="student-card" data-name="Emma" data-color="purple">
          <div class="student-avatar purple">E</div>
          <span class="student-name">Emma</span>
          <button class="student-remove">✕</button>
        </div>
        <div class="student-card" data-name="Oliver" data-color="teal">
          <div class="student-avatar teal">O</div>
          <span class="student-name">Oliver</span>
          <button class="student-remove">✕</button>
        </div>
        <div class="student-card" data-name="Sofia" data-color="pink">
          <div class="student-avatar pink">S</div>
          <span class="student-name">Sofia</span>
          <button class="student-remove">✕</button>
        </div>
        <div class="student-card" data-name="Lucas" data-color="green">
          <div class="student-avatar green">L</div>
          <span class="student-name">Lucas</span>
          <button class="student-remove">✕</button>
        </div>
        <div class="student-card" data-name="Nora" data-color="orange">
          <div class="student-avatar orange">N</div>
          <span class="student-name">Nora</span>
          <button class="student-remove">✕</button>
        </div>
      </div>

      <div class="students-footer">
        <div class="waiting-text">
          Venter på at elever kobler til...
          <div class="waiting-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="student-count">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          5
        </div>
      </div>
    </div>

  </main>

  <script src="fagprat-data.js"></script>
  <script>
    // ── Dynamic title ──
    (function() {
      var fp = getCurrentFagPrat();
      if (fp) {
        var titleEl = document.querySelector('.top-bar-title');
        if (titleEl) titleEl.textContent = fp.title;
      }
    })();

    // ── Groups logic ──
    var groupsEnabled = localStorage.getItem('fagprat-groups-enabled') === '1';
    var groupCount = parseInt(localStorage.getItem('fagprat-group-count') || '4');
    var btnGroups = document.getElementById('btn-groups');
    var btnStart = document.getElementById('btn-start');

    if (groupsEnabled) {
      btnGroups.style.display = '';
      btnStart.style.display = 'none';
    }

    btnGroups.addEventListener('click', function() {
      var area = document.getElementById('students-area');
      var cards = Array.from(area.querySelectorAll('.student-card'));

      // Shuffle students randomly
      for (var i = cards.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = cards[i];
        cards[i] = cards[j];
        cards[j] = temp;
      }

      // Split into groups
      var groups = [];
      for (var g = 0; g < groupCount; g++) {
        groups.push([]);
      }
      cards.forEach(function(card, idx) {
        groups[idx % groupCount].push(card);
      });

      // Build grouped view
      area.innerHTML = '';
      area.classList.add('grouped');

      groups.forEach(function(group, gi) {
        if (group.length === 0) return;
        var col = document.createElement('div');
        col.className = 'group-column';

        var label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = 'Gruppe ' + (gi + 1);
        col.appendChild(label);

        var cardsWrap = document.createElement('div');
        cardsWrap.className = 'group-cards';
        group.forEach(function(card) {
          // Clone card without remove button for grouped view
          var clone = card.cloneNode(true);
          var removeBtn = clone.querySelector('.student-remove');
          if (removeBtn) removeBtn.remove();
          cardsWrap.appendChild(clone);
        });
        col.appendChild(cardsWrap);
        area.appendChild(col);
      });

      // Swap buttons: hide "Opprett grupper", show "Start aktiviteten"
      btnGroups.style.display = 'none';
      btnStart.style.display = '';
    });

    // ── Start activity ──
    btnStart.addEventListener('click', function() {
      window.location.href = 'fagprat-steg0.html';
    });
  </script>

</body>
</html>
