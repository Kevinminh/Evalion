<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagre FagPrat | Evalion</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="sidebar.css">
  <style>
    .page-content {
      max-width: calc(1100px + var(--sidebar-expanded));
    }

    /* ── Page Header ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }
    .page-header-left h1 {
      font-size: var(--text-3xl);
      font-weight: var(--font-extrabold);
      color: var(--color-text-primary);
    }
    .page-header-left p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .page-header-actions {
      display: flex;
      gap: var(--space-3);
      flex-shrink: 0;
    }

    /* ── Action buttons ── */
    .btn-tilbake {
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      border-radius: var(--radius-xl);
      background: var(--color-neutral-0);
      color: var(--color-text-secondary);
      border: 2px solid var(--color-neutral-300);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: var(--font-family-body);
    }
    .btn-tilbake:hover {
      border-color: var(--color-neutral-400);
      color: var(--color-text-primary);
    }
    .btn-lagre {
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      border-radius: var(--radius-xl);
      background: var(--color-primary-500);
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--color-primary-700);
      transition: all var(--transition-fast);
      font-family: var(--font-family-body);
    }
    .btn-lagre:hover {
      background: var(--color-primary-400);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--color-primary-700), var(--shadow-glow-primary);
    }
    .btn-lagre:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--color-primary-700);
    }

    /* ══════════════════════════════════════════
       TITTEL-BOKS
       ══════════════════════════════════════════ */
    .title-card {
      background: var(--color-neutral-0);
      border: 1.5px solid var(--color-neutral-200);
      border-radius: var(--radius-2xl);
      padding: var(--space-6) var(--space-8);
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-sm);
    }
    .title-card label {
      display: block;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-2);
    }
    .title-card-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1.5px solid var(--color-neutral-200);
      border-radius: var(--radius-xl);
      font-family: var(--font-family-body);
      font-size: var(--text-xl);
      font-weight: var(--font-extrabold);
      color: var(--color-text-primary);
      background: var(--color-neutral-50);
      outline: none;
      transition: all var(--transition-fast);
    }
    .title-card-input::placeholder {
      color: var(--color-text-muted);
    }
    .title-card-input:focus {
      border-color: var(--color-primary-400);
      background: var(--color-neutral-0);
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }

    /* Viktige begreper */
    .begreper-section {
      margin-top: var(--space-4);
    }
    .begreper-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }
    .begreper-label {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      font-weight: var(--font-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn-ai-begreper {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-tertiary);
      background: var(--color-neutral-0);
      border: 1.5px solid var(--color-neutral-200);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .btn-ai-begreper:hover {
      border-color: var(--color-primary-300);
      color: var(--color-primary-500);
      background: var(--color-primary-50);
    }
    .btn-ai-begreper svg { width: 16px; height: 16px; }
    .begreper-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .begrep-tag {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      background: var(--color-primary-100);
      color: var(--color-primary-600);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      font-family: var(--font-family-body);
      border: none;
      cursor: default;
    }
    .begrep-tag .remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      font-size: var(--text-xs);
      color: var(--color-primary-400);
      cursor: pointer;
      border-radius: var(--radius-full);
      transition: all var(--transition-fast);
    }
    .begrep-tag .remove:hover {
      color: var(--color-primary-700);
      background: var(--color-primary-200);
    }
    .begrep-add {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      background: var(--color-neutral-0);
      color: var(--color-text-tertiary);
      border: 1.5px dashed var(--color-neutral-300);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      font-family: var(--font-family-body);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .begrep-add:hover {
      border-color: var(--color-primary-300);
      color: var(--color-primary-500);
      background: var(--color-primary-50);
    }

    /* ══════════════════════════════════════════
       SYNLIGHET — offentlig / privat
       ══════════════════════════════════════════ */
    .visibility-section {
      margin-top: var(--space-5);
    }
    .visibility-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-3);
    }
    .visibility-toggle {
      display: inline-flex;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--color-neutral-200);
      overflow: hidden;
    }
    .visibility-btn {
      padding: var(--space-3) var(--space-6);
      font-family: var(--font-family-body);
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
      background: var(--color-neutral-0);
      color: var(--color-text-tertiary);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .visibility-btn:first-child {
      border-right: 1.5px solid var(--color-neutral-200);
    }
    .visibility-btn:hover {
      background: var(--color-neutral-50);
      color: var(--color-text-primary);
    }
    .visibility-btn.selected {
      background: var(--color-primary-50);
      color: var(--color-primary-600);
    }
    .visibility-btn svg {
      width: 16px;
      height: 16px;
    }
    .visibility-desc {
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <img class="logo-mini" src="../Logoer og professoren/E-minilogo.jpg" alt="E">
      <img class="logo-full" src="../Logoer og professoren/Evalion (gjennomsiktig).png" alt="Evalion">
    </div>

    <div class="sidebar-cta">
      <button class="sidebar-cta-btn" onclick="window.location.href='lag-pastand.html'">
        <span class="sidebar-cta-icon">+</span>
        <span class="sidebar-cta-label">Lag en FagPrat</span>
      </button>
    </div>

    <div class="sidebar-nav">
      <a class="sidebar-item" href="utforsk.html">
        <span class="sidebar-item-icon">🔍</span>
        <span class="sidebar-item-label">Utforsk</span>
      </a>
      <a class="sidebar-item" href="min-samling.html">
        <span class="sidebar-item-icon">📁</span>
        <span class="sidebar-item-label">Min samling</span>
      </a>
      <a class="sidebar-item" href="#">
        <span class="sidebar-item-icon">🕐</span>
        <span class="sidebar-item-label">Historikk</span>
      </a>
    </div>

    <div class="sidebar-spacer"></div>

    <a class="sidebar-user" href="#">
      <div class="sidebar-user-avatar">MF</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">Markus Furseth</span>
        <span class="sidebar-user-email">markus@evalion.no</span>
      </div>
    </a>
  </nav>

  <!-- ═══════════ MAIN CONTENT ═══════════ -->
  <main class="page-content">

    <!-- ── Header ── -->
    <div class="page-header">
      <div class="page-header-left">
        <h1>Fullfør FagPraten</h1>
      </div>
      <div class="page-header-actions">
        <button class="btn-tilbake" onclick="window.location.href='lag-pastand.html'">Tilbake</button>
        <button class="btn-lagre">Lagre</button>
      </div>
    </div>

    <!-- ═══════════ TITTEL + BEGREPER + SYNLIGHET ═══════════ -->
    <div class="title-card">
      <label>Tittel på din FagPrat</label>
      <input class="title-card-input" type="text" placeholder="F.eks. Newtons lover, Fotosyntesen...">

      <div class="begreper-section">
        <div class="begreper-header">
          <div class="begreper-label">Viktige begreper</div>
          <button class="btn-ai-begreper" title="Foreslå begreper med AI">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="3"/>
              <text x="12" y="15.5" text-anchor="middle" font-size="9" font-weight="bold" fill="currentColor" stroke="none" font-family="sans-serif">AI</text>
            </svg>
          </button>
        </div>
        <div class="begreper-tags">
          <span class="begrep-tag">Kraft <span class="remove">&times;</span></span>
          <span class="begrep-tag">Masse <span class="remove">&times;</span></span>
          <span class="begrep-tag">Akselerasjon <span class="remove">&times;</span></span>
          <button class="begrep-add">+ Legg til begrep</button>
        </div>
      </div>

      <div class="visibility-section">
        <span class="visibility-label">Synlighet</span>
        <div class="visibility-toggle">
          <button class="visibility-btn selected" data-visibility="public">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            Offentlig
          </button>
          <button class="visibility-btn" data-visibility="private">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Privat
          </button>
        </div>
        <div class="visibility-desc" id="visibility-desc">Alle kan finne og bruke denne FagPraten</div>
      </div>
    </div>

  </main>

  <script>
    // Synlighet-toggle
    const visibilityBtns = document.querySelectorAll('.visibility-btn');
    const visibilityDesc = document.getElementById('visibility-desc');

    const descriptions = {
      public: 'Alle kan finne og bruke denne FagPraten',
      private: 'Bare du kan se og bruke denne FagPraten'
    };

    visibilityBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        visibilityBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        visibilityDesc.textContent = descriptions[btn.dataset.visibility];
      });
    });
  </script>
</body>
</html>
