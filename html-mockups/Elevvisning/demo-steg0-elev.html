<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevvisning – Steg 0: Velg påstand</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family-body);
      background: #E8E0F0;
      padding: var(--space-8) var(--space-6);
      min-height: 100vh;
    }

    /* ── Page title ── */
    .page-title {
      font-size: var(--text-2xl); font-weight: var(--font-extrabold);
      color: var(--color-primary-700); margin-bottom: var(--space-8);
      text-align: center;
    }

    /* ── Step navigation bar ── */
    .step-nav-bar {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .step-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-1-5);
      padding: var(--space-3) var(--space-2);
      border-radius: var(--radius-xl);
      text-align: center;
      text-decoration: none;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .step-nav-item:hover {
      opacity: 0.7;
    }
    .step-nav-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--font-extrabold);
      background: var(--color-neutral-200);
      color: var(--color-neutral-500);
      flex-shrink: 0;
    }
    .step-nav-label {
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: var(--color-text-tertiary);
      line-height: 1.2;
    }
    .step-nav-item.active {
      opacity: 1;
      background: var(--color-primary-100);
      cursor: default;
    }
    .step-nav-item.active .step-nav-num {
      background: var(--color-primary-500);
      color: white;
    }
    .step-nav-item.active .step-nav-label {
      color: var(--color-primary-700);
    }

    /* ── Device row ── */
    .devices-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-10);
      align-items: center;
    }
    .device-col {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
    }
    .device-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--color-neutral-500);
    }

    /* ══════════════════════════════════════
       iPAD PRO 13" (7th gen) FRAMES
       Screen aspect ratio: 4:3
       iPad PNG: 519×481 (portrait with transparency).
       Screen area: top:43 left:120 bottom:438 right:396
       ══════════════════════════════════════ */

    /* ── iPad Landscape (rotated 90° CW) ── */
    .ipad-landscape {
      position: relative;
      width: 700px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }
    .ipad-landscape .ipad-frame-img {
      position: absolute;
      /* Scale: device height (440px natural) becomes landscape width.
         700 / 440 = 1.591 → image width = 519 * 1.591 = 826px */
      width: 826px;
      height: auto;
      top: 50%;
      left: calc(50% + 2.25px);
      transform: translate(-50%, -50%) rotate(90deg) scaleY(0.991);
      z-index: 2;
      pointer-events: none;
    }
    .ipad-landscape .ipad-screen {
      position: absolute;
      /* Mathematically computed from rotated screen coordinates */
      top: 7.33%;
      left: 5.10%;
      width: 89.81%;
      height: 86.28%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 6px;
      z-index: 1;
    }

    /* ── iPad Portrait (original orientation) ── */
    .ipad-portrait {
      position: relative;
      /* Same physical device as landscape. Landscape long edge = 700px.
         Portrait long edge = height. PNG aspect: h/w = 481/519 = 0.927.
         To get height=700: width = 700 / 0.927 = 755px */
      width: 755px;
    }
    .ipad-portrait .ipad-frame-img {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }
    .ipad-portrait .ipad-screen {
      position: absolute;
      /* From iPad PNG pixel analysis:
         top:43 left:120 bottom:438 right:396 in 519×481 */
      top: 8.94%;
      left: 23.12%;
      width: 53.18%;
      height: 82.12%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 8px;
      z-index: 1;
    }

    /* ══════════════════════════════════════
       STUDENT VIEW (shared styles)
       ══════════════════════════════════════ */

    /* Top bar */
    .sv-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-5);
      height: 56px; min-height: 56px;
      background: var(--color-neutral-0);
      border-bottom: 1.5px solid var(--color-neutral-200);
    }
    .sv-topbar-left {
      display: flex; align-items: center; gap: var(--space-3);
    }
    .sv-topbar-logo { height: 30px; object-fit: contain; }
    .sv-topbar-divider { width: 1.5px; height: 24px; background: var(--color-neutral-300); }
    .sv-topbar-title {
      font-size: 14px; font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }
    .sv-step-badge {
      font-size: 12px; font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
      background: var(--color-neutral-100);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }
    .sv-step-badge .badge-short { display: none; }
    .sv-topbar-right {
      display: flex; align-items: center; gap: var(--space-2);
    }
    .sv-nickname-badge {
      font-size: 12px; font-weight: var(--font-bold);
      color: var(--color-primary-700);
      background: var(--color-primary-100);
      padding: 4px 10px;
      border-radius: var(--radius-full);
    }

    /* Main content area */
    .sv-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5) var(--space-6);
      gap: var(--space-6);
      min-height: 0;
      overflow: hidden;
    }

    /* Professor */
    .sv-professor {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: var(--space-2);
    }
    .sv-professor-img {
      border-radius: var(--radius-full);
      object-fit: cover;
      border: 3px solid var(--color-primary-200);
      background: var(--color-bg-tertiary);
      animation: gentleBounce 3s ease-in-out infinite;
    }
    .sv-professor-label {
      font-size: 12px; font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
    }
    .waiting-dots {
      display: flex; gap: 4px; justify-content: center; margin-top: 4px;
    }
    .waiting-dots span {
      display: block; width: 6px; height: 6px;
      background: var(--color-primary-300);
      border-radius: var(--radius-full);
      animation: dotPulse 1.4s infinite ease-in-out both;
    }
    .waiting-dots span:nth-child(1) { animation-delay: -0.32s; }
    .waiting-dots span:nth-child(2) { animation-delay: -0.16s; }
    .waiting-dots span:nth-child(3) { animation-delay: 0s; }

    /* ── Statement cards grid ──
       All cards same height via grid-auto-rows: 1fr. */
    .sv-statements-grid {
      display: grid;
      grid-auto-rows: 1fr;
      flex: 1;
    }
    .sv-stmt-card {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-xl);
      font-weight: var(--font-semibold);
      transition: all 0.25s ease;
      line-height: var(--leading-relaxed);
      border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .sv-card-yellow { background: #FFF8E1; color: #5D4037; border-color: #FFD54F; }
    .sv-card-blue   { background: #E8F4FD; color: #1565C0; border-color: #90CAF9; }
    .sv-card-orange { background: #FFF3E0; color: #BF360C; border-color: #FFB74D; }
    .sv-card-purple { background: #F3E5F5; color: #6A1B9A; border-color: #CE93D8; }
    .sv-card-red    { background: #FFEBEE; color: #B71C1C; border-color: #EF9A9A; }

    /* Selected/dimmed states (synced from teacher) */
    .sv-stmt-card.sv-selected {
      transform: scale(1.05);
      box-shadow: var(--shadow-xl, 0 8px 24px rgba(0,0,0,0.15));
    }
    .sv-stmt-card.sv-dimmed {
      opacity: 0.4;
      transform: scale(0.97);
      pointer-events: none;
    }

    /* ── Landscape: professor left, cards right ── */
    .ipad-landscape .sv-body {
      padding: var(--space-4) var(--space-8);
      gap: var(--space-8);
    }
    .ipad-landscape .sv-professor-img { width: 120px; height: 120px; }
    .ipad-landscape .sv-statements-grid {
      grid-template-columns: 1fr;
      gap: var(--space-4);
      flex: 0 1 auto;
      width: 65%;
      align-self: center;
    }
    .ipad-landscape .sv-stmt-card {
      padding: var(--space-3) var(--space-5);
    }

    /* ── Portrait: cards full width, professor below ── */
    .ipad-portrait .sv-topbar {
      height: 48px; min-height: 48px;
      padding: 0 var(--space-4);
    }
    .ipad-portrait .sv-topbar-logo { height: 26px; }
    .ipad-portrait .sv-topbar-divider { height: 20px; }
    .ipad-portrait .sv-topbar-title { font-size: 12px; }
    .ipad-portrait .sv-step-badge { font-size: 10px; padding: 3px 8px; white-space: nowrap; }
    .ipad-portrait .sv-step-badge .badge-full { display: none; }
    .ipad-portrait .sv-step-badge .badge-short { display: inline; }
    .ipad-portrait .sv-nickname-badge { font-size: 10px; padding: 3px 8px; }
    .ipad-portrait .sv-body {
      flex-direction: column;
      padding: var(--space-5) var(--space-5);
      gap: 0;
      justify-content: space-between;
    }
    .ipad-portrait .sv-professor-img { width: 72px; height: 72px; }
    .ipad-portrait .sv-professor-label { font-size: 10px; }
    .ipad-portrait .waiting-dots span { width: 5px; height: 5px; }
    .ipad-portrait .sv-professor {
      margin-bottom: var(--space-6);
    }
    .ipad-portrait .sv-statements-grid {
      grid-template-columns: 1fr;
      gap: var(--space-4);
      width: 100%;
      flex: none;
      /* Center cards between professor and bottom */
      margin: auto 0;
    }
    .ipad-portrait .sv-stmt-card {
      padding: var(--space-3) var(--space-4);
    }

    /* ══════════════════════════════════════
       ANIMATIONS
       ══════════════════════════════════════ */
    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
  <style>
    html, body { background: transparent !important; background-color: transparent !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
    .devices-row { padding: 0 !important; margin: 0 !important; background: transparent !important; justify-content: center !important; }
    .device-col { padding: 0 !important; margin: 0 !important; background: transparent !important; }
  </style>
</head>
<body>
  <div class="devices-row">

    <!-- ════════════════ iPad Liggende ════════════════ -->
    <div class="device-col">
      <div class="ipad-landscape">
        <img src="../assets/iPad.png" alt="" class="ipad-frame-img">
        <div class="ipad-screen">
          <div class="sv-topbar">
            <div class="sv-topbar-left">
              <img src="../assets/FagPrat - logo.png" alt="FagPrat" class="sv-topbar-logo">
              <div class="sv-topbar-divider"></div>
              <span class="sv-topbar-title">Klima og bærekraft</span>
            </div>
            <div class="sv-topbar-right">
              <span class="sv-nickname-badge">Markus</span>
              <span class="sv-step-badge"><span class="badge-full">Steg 0 av 6</span><span class="badge-short">0/6</span></span>
            </div>
          </div>
          <div class="sv-body">
            <div class="sv-professor">
              <img src="../assets/Professoren.png" alt="Professoren" class="sv-professor-img">
              <span class="sv-professor-label">Venter på læreren</span>
              <div class="waiting-dots"><span></span><span></span><span></span></div>
            </div>
            <div class="sv-statements-grid">
              <div class="sv-stmt-card sv-card-blue">Klimaendringene rammer fattige land hardest.</div>
              <div class="sv-stmt-card sv-card-orange">El-biler er helt utslippsfrie.</div>
              <div class="sv-stmt-card sv-card-purple">Alle FNs bærekraftsmål handler om klima og miljø.</div>
              <div class="sv-stmt-card sv-card-yellow">Fornybar energi kan erstatte fossil energi og løse klimaproblemet.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Sync statement selection from teacher -->
  <script>
    window.addEventListener('message', function(e) {
      if (!e.data || e.data.type !== 'fagprat-statement') return;
      var index = e.data.index;
      var cards = document.querySelectorAll('.sv-stmt-card');
      cards.forEach(function(card, i) {
        if (i === index) {
          card.classList.add('sv-selected');
          card.classList.remove('sv-dimmed');
        } else {
          card.classList.add('sv-dimmed');
          card.classList.remove('sv-selected');
        }
      });
    });
  </script>

  <!-- Auto-size statement card text per device -->
  <script>
    (function() {
      var MAX_FONT = 14;
      var MIN_FONT = 9;

      function fitCards(container) {
        var grid = container.querySelector('.sv-statements-grid');
        if (!grid) return;
        var cards = grid.querySelectorAll('.sv-stmt-card');
        if (!cards.length) return;

        var fontSize = MAX_FONT;
        cards.forEach(function(c) { c.style.fontSize = fontSize + 'px'; });

        while (fontSize > MIN_FONT) {
          var overflow = false;
          cards.forEach(function(c) {
            if (c.scrollHeight > c.clientHeight + 1) overflow = true;
          });
          if (!overflow) break;
          fontSize -= 0.5;
          cards.forEach(function(c) { c.style.fontSize = fontSize + 'px'; });
        }
      }

      function run() {
        document.querySelectorAll('.ipad-screen').forEach(function(s) {
          fitCards(s);
        });
      }

      window.addEventListener('load', function() { setTimeout(run, 50); });
      window.addEventListener('resize', run);
    })();
  </script>

</body>
</html>
