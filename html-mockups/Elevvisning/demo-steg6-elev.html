<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevvisning – Steg 6: Egenvurdering</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family-body);
      background: #E8E0F0;
      padding: var(--space-8) var(--space-6);
      min-height: 100vh;
    }

    /* ── Page title ── */
    .page-title {
      font-size: var(--text-2xl); font-weight: var(--font-extrabold);
      color: var(--color-primary-700); margin-bottom: var(--space-8);
      text-align: center;
    }

    /* ── Step navigation bar ── */
    .step-nav-bar {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .step-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-1-5);
      padding: var(--space-3) var(--space-2);
      border-radius: var(--radius-xl);
      text-align: center;
      text-decoration: none;
      opacity: 0.45;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .step-nav-item:hover { opacity: 0.7; }
    .step-nav-num {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: var(--font-extrabold);
      background: var(--color-neutral-200); color: var(--color-neutral-500); flex-shrink: 0;
    }
    .step-nav-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      color: var(--color-text-tertiary); line-height: 1.2;
    }
    .step-nav-item.active {
      opacity: 1; background: var(--color-primary-100); cursor: default;
    }
    .step-nav-item.active .step-nav-num { background: var(--color-primary-500); color: white; }
    .step-nav-item.active .step-nav-label { color: var(--color-primary-700); }

    /* ── Device row ── */
    .devices-row {
      display: flex;
      gap: var(--space-10);
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .device-col {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
    }
    .device-label {
      font-size: var(--text-xs); font-weight: var(--font-bold);
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--color-neutral-500);
    }

    /* ══════════════════════════════════════
       iPAD PRO 13" FRAMES
       ══════════════════════════════════════ */

    .ipad-landscape {
      position: relative;
      width: 700px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }
    .ipad-landscape .ipad-frame-img {
      position: absolute;
      width: 826px;
      height: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      z-index: 2;
      pointer-events: none;
    }
    .ipad-landscape .ipad-screen {
      position: absolute;
      top: 7.33%;
      left: 5.10%;
      width: 89.81%;
      height: 86.28%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 6px;
      z-index: 1;
    }

    .ipad-portrait {
      position: relative;
      width: 755px;
    }
    .ipad-portrait .ipad-frame-img {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }
    .ipad-portrait .ipad-screen {
      position: absolute;
      top: 8.94%;
      left: 23.12%;
      width: 53.18%;
      height: 82.12%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 8px;
      z-index: 1;
    }

    /* ══════════════════════════════════════
       STUDENT VIEW – shared styles
       ══════════════════════════════════════ */

    .sv-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-5);
      height: 56px; min-height: 56px;
      background: var(--color-neutral-0);
      border-bottom: 1.5px solid var(--color-neutral-200);
    }
    .sv-topbar-left {
      display: flex; align-items: center; gap: var(--space-3);
    }
    .sv-topbar-logo { height: 30px; object-fit: contain; }
    .sv-topbar-divider { width: 1.5px; height: 24px; background: var(--color-neutral-300); }
    .sv-topbar-title {
      font-size: 14px; font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }
    .sv-step-badge {
      font-size: 12px; font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
      background: var(--color-neutral-100);
      padding: 4px 10px;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }
    .sv-step-badge .badge-short { display: none; }
    .sv-topbar-right {
      display: flex; align-items: center; gap: var(--space-2);
    }
    .sv-nickname-badge {
      font-size: 12px; font-weight: var(--font-bold);
      color: var(--color-primary-700);
      background: var(--color-primary-100);
      padding: 4px 10px;
      border-radius: var(--radius-full);
    }

    /* Main content area */
    .sv-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: var(--space-5) var(--space-5);
      min-height: 0;
      overflow: hidden;
      gap: 0;
    }

    /* ── Statement with fasit badge ── */
    .sv-stmt-wrap {
      position: relative;
      width: 100%;
      margin-top: var(--space-6);
    }
    .sv-fasit-badge {
      position: absolute;
      top: -4px; left: 50%;
      transform: translate(-50%, -65%);
      z-index: 5;
      background: var(--color-sant);
      color: white;
      padding: var(--space-2) var(--space-6);
      border-radius: var(--radius-full);
      font-size: 18px;
      font-weight: var(--font-extrabold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: var(--shadow-lg);
    }
    .sv-stmt-card {
      padding: var(--space-5) var(--space-5);
      border-radius: var(--radius-xl);
      font-weight: var(--font-bold);
      font-size: 16px;
      line-height: var(--leading-relaxed);
      border: 2px solid;
      text-align: center;
      width: 100%;
    }
    .sv-card-blue { background: #E8F4FD; color: #1565C0; border-color: #90CAF9; }

    /* ── Self-assessment section – centered between card and submit ── */
    .sv-assess-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: var(--space-3);
    }
    .sv-assess-title {
      font-size: 22px;
      font-weight: var(--font-extrabold);
      color: var(--color-text-primary);
      text-align: center;
    }
    .sv-assess-desc {
      font-size: 13px;
      line-height: var(--leading-relaxed);
      color: var(--color-text-secondary);
      text-align: center;
    }

    /* ── Scale row with labels ── */
    .sv-scale-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
      margin-top: var(--space-2);
    }
    .sv-scale-label {
      font-size: 12px;
      font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sv-scale-row {
      display: flex;
      gap: var(--space-3);
      flex: 1;
    }
    .sv-scale-btn {
      flex: 1;
      padding: var(--space-3) var(--space-2);
      border: 2px solid var(--color-neutral-200);
      border-radius: var(--radius-2xl);
      background: var(--color-neutral-0);
      font-size: 15px;
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 var(--color-neutral-300);
    }
    .sv-scale-btn.selected {
      background: var(--color-primary-500);
      color: white;
      border-color: var(--color-primary-500);
      box-shadow: 0 2px 0 var(--color-primary-700);
      transform: translateY(2px);
    }

    /* ── Submit button ── */
    .sv-submit-btn {
      padding: var(--space-3) var(--space-6);
      border: none;
      border-radius: var(--radius-2xl);
      background: var(--color-primary-500);
      color: white;
      font-size: 15px;
      font-weight: var(--font-bold);
      cursor: pointer;
      box-shadow: 0 4px 0 var(--color-primary-700);
      align-self: center;
      margin-top: auto;
    }
    .sv-submit-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--color-primary-700);
    }
    .sv-submit-btn.sent {
      background: #4CAF50;
      box-shadow: 0 4px 0 #2E7D32;
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       Landscape overrides
       ══════════════════════════════════════ */
    .ipad-landscape .sv-fasit-badge { font-size: 14px; padding: var(--space-1) var(--space-5); }
    .ipad-landscape .sv-stmt-card { padding: var(--space-4) var(--space-5); font-size: 15px; }
    .ipad-landscape .sv-assess-title { font-size: 18px; }
    .ipad-landscape .sv-assess-desc { font-size: 12px; }
    .ipad-landscape .sv-scale-label { font-size: 11px; }
    .ipad-landscape .sv-scale-btn { font-size: 13px; padding: var(--space-2) var(--space-3); }
    .ipad-landscape .sv-submit-btn { font-size: 13px; padding: var(--space-2) var(--space-5); }

    /* ══════════════════════════════════════
       Portrait overrides
       ══════════════════════════════════════ */
    .ipad-portrait .sv-topbar {
      height: 48px; min-height: 48px;
      padding: 0 var(--space-4);
    }
    .ipad-portrait .sv-topbar-logo { height: 26px; }
    .ipad-portrait .sv-topbar-divider { height: 20px; }
    .ipad-portrait .sv-topbar-title { font-size: 12px; }
    .ipad-portrait .sv-step-badge { font-size: 10px; padding: 3px 8px; white-space: nowrap; }
    .ipad-portrait .sv-step-badge .badge-full { display: none; }
    .ipad-portrait .sv-step-badge .badge-short { display: inline; }
    .ipad-portrait .sv-nickname-badge { font-size: 10px; padding: 3px 8px; }
    .ipad-portrait .sv-stmt-card { padding: var(--space-5) var(--space-5); font-size: 16px; }
    .ipad-portrait .sv-assess-title { font-size: 22px; }
    .ipad-portrait .sv-assess-desc { font-size: 13px; }
    .ipad-portrait .sv-scale-label { font-size: 12px; }
    .ipad-portrait .sv-scale-btn { font-size: 15px; padding: var(--space-3); }
    .ipad-portrait .sv-submit-btn { font-size: 15px; padding: var(--space-3) var(--space-6); }
  </style>
  <style>
    html, body { background: transparent !important; background-color: transparent !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
    .devices-row { padding: 0 !important; margin: 0 !important; background: transparent !important; justify-content: center !important; }
    .device-col { padding: 0 !important; margin: 0 !important; background: transparent !important; }
  </style>
</head>
<body>
  <div class="devices-row">

    <!-- ════════════════ iPad Liggende ════════════════ -->
    <div class="device-col">
      <div class="ipad-landscape">
        <img src="../../Logoer og professoren/iPad.png" alt="" class="ipad-frame-img">
        <div class="ipad-screen">
          <div class="sv-topbar">
            <div class="sv-topbar-left">
              <img src="../../Logoer og professoren/FagPrat - logo.png" alt="FagPrat" class="sv-topbar-logo">
              <div class="sv-topbar-divider"></div>
              <span class="sv-topbar-title">Brøk, prosent og desimaltall</span>
            </div>
            <div class="sv-topbar-right">
              <span class="sv-nickname-badge">Markus</span>
              <span class="sv-step-badge"><span class="badge-full">Steg 6 av 6</span><span class="badge-short">6/6</span></span>
            </div>
          </div>
          <div class="sv-body">
              <!-- Statement with fasit badge -->
              <div class="sv-stmt-wrap">
                <div class="sv-fasit-badge">Sant</div>
                <div class="sv-stmt-card sv-card-blue">50 % er alltid det samme som halvparten.</div>
              </div>

              <!-- Self-assessment -->
              <div class="sv-assess-group">
                <div class="sv-assess-title">Hvor godt forstår du dette nå?</div>
                <div class="sv-assess-desc">Vurder forståelsen din fra 1 til 5</div>
                <div class="sv-scale-wrap">
                  <span class="sv-scale-label">Forstår ikke</span>
                  <div class="sv-scale-row">
                    <button class="sv-scale-btn">1</button>
                    <button class="sv-scale-btn">2</button>
                    <button class="sv-scale-btn">3</button>
                    <button class="sv-scale-btn">4</button>
                    <button class="sv-scale-btn">5</button>
                  </div>
                  <span class="sv-scale-label">Forstår godt</span>
                </div>
              </div>

              <button class="sv-submit-btn">Send inn</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    document.querySelectorAll('.sv-scale-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var row = btn.closest('.sv-scale-row');
        row.querySelectorAll('.sv-scale-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
      });
    });

    // Submit button feedback
    document.querySelectorAll('.sv-submit-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        btn.textContent = 'Sendt!';
        btn.classList.add('sent');
      });
    });
  </script>

</body>
</html>
