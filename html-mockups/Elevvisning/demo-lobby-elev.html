<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevvisning – Lobby</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family-body);
      background: #E8E0F0;
      padding: var(--space-8) var(--space-6);
      min-height: 100vh;
    }

    .devices-row {
      display: flex; justify-content: center; align-items: flex-start; gap: var(--space-8);
    }
    .device-col { display: flex; flex-direction: column; align-items: center; gap: var(--space-3); }

    .ipad-landscape {
      position: relative;
      width: 700px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }
    .ipad-landscape .ipad-frame-img {
      position: absolute;
      width: 826px; height: auto;
      top: 50%; left: calc(50% + 2.25px);
      transform: translate(-50%, -50%) rotate(90deg) scaleY(0.991);
      z-index: 2; pointer-events: none;
    }
    .ipad-landscape .ipad-screen {
      position: absolute;
      top: 7.33%; left: 5.10%; width: 89.81%; height: 86.28%;
      overflow: hidden; display: flex; flex-direction: column;
      background: var(--color-bg-primary);
      border-radius: 6px; z-index: 1;
    }

    /* ── Student view styles ── */
    .sv-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-4);
      height: 44px; min-height: 44px;
      background: var(--color-neutral-0);
      border-bottom: 1.5px solid var(--color-neutral-200);
    }
    .sv-topbar-left { display: flex; align-items: center; gap: var(--space-2); }
    .sv-topbar-logo { height: 24px; object-fit: contain; }
    .sv-topbar-divider { width: 1.5px; height: 20px; background: var(--color-neutral-300); }
    .sv-topbar-title { font-size: 12px; font-weight: var(--font-bold); color: var(--color-text-primary); }
    .sv-topbar-right { display: flex; align-items: center; gap: var(--space-3); }
    .sv-lobby-badge {
      font-size: 10px; font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
      background: var(--color-neutral-100);
      padding: 3px 8px; border-radius: var(--radius-full);
    }
    .sv-nickname-badge {
      font-size: 10px; font-weight: var(--font-bold);
      color: var(--color-primary-700);
      background: var(--color-primary-100);
      padding: 3px 10px; border-radius: var(--radius-full);
    }

    .sv-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: var(--space-5); min-height: 0; overflow: hidden;
      gap: var(--space-4);
    }

    .sv-state { display: none; width: 100%; flex-direction: column; align-items: center; gap: var(--space-4); }
    .sv-state.active { display: flex; animation: fadeIn 0.3s ease-out; }

    .sv-logo-large { height: 58px; object-fit: contain; }
    .sv-form-title { font-size: 14px; font-weight: var(--font-bold); color: var(--color-text-primary); text-align: center; }
    .sv-input-wrap { width: 75%; max-width: 280px; }
    .sv-input {
      width: 100%; padding: var(--space-3) var(--space-4);
      border: 2.5px solid var(--color-primary-200); border-radius: var(--radius-2xl);
      font-family: var(--font-family-body); font-size: 18px; font-weight: var(--font-bold);
      color: var(--color-text-primary); text-align: center; letter-spacing: 0.15em;
      background: var(--color-neutral-0); outline: none; transition: border-color 0.15s;
    }
    .sv-input:focus { border-color: var(--color-primary-500); }
    .sv-input::placeholder { color: var(--color-neutral-300); letter-spacing: 0.1em; font-size: 16px; }
    .sv-input-nickname { letter-spacing: 0.02em; font-size: 16px; }
    .sv-input-nickname::placeholder { letter-spacing: 0.02em; font-size: 15px; }

    .sv-primary-btn {
      padding: var(--space-2) var(--space-6); border: none; border-radius: var(--radius-2xl);
      background: var(--color-primary-500); color: white;
      font-size: 14px; font-weight: var(--font-bold); cursor: pointer;
      box-shadow: 0 4px 0 var(--color-primary-700); font-family: var(--font-family-body);
    }
    .sv-primary-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--color-primary-700); }

    .sv-helper-text { font-size: 11px; color: var(--color-primary-400); font-weight: var(--font-semibold); }
    .sv-error-text {
      font-size: 12px; font-weight: var(--font-bold);
      color: var(--color-error);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .sv-professor { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
    .sv-professor-img {
      width: 100px; height: 100px; border-radius: var(--radius-full);
      object-fit: cover; border: 3px solid var(--color-primary-200);
      background: var(--color-bg-tertiary); animation: gentleBounce 3s ease-in-out infinite;
    }
    .sv-professor-label { font-size: 13px; font-weight: var(--font-semibold); color: var(--color-text-tertiary); text-align: center; }
    .waiting-dots { display: flex; gap: 4px; justify-content: center; margin-top: 4px; }
    .waiting-dots span {
      display: block; width: 6px; height: 6px;
      background: var(--color-primary-300); border-radius: var(--radius-full);
      animation: dotPulse 1.4s infinite ease-in-out both;
    }
    .waiting-dots span:nth-child(1) { animation-delay: -0.32s; }
    .waiting-dots span:nth-child(2) { animation-delay: -0.16s; }
    .waiting-dots span:nth-child(3) { animation-delay: 0s; }

    .sv-welcome { font-size: 14px; font-weight: var(--font-bold); color: var(--color-primary-700); text-align: center; }
    .sv-welcome-name { color: var(--color-primary-500); }

    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <style>
    html, body { background: transparent !important; background-color: transparent !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
    .devices-row { padding: 0 !important; margin: 0 !important; background: transparent !important; justify-content: center !important; }
    .device-col { padding: 0 !important; margin: 0 !important; background: transparent !important; }
  </style>
</head>
<body>
  <div class="devices-row">
    <div class="device-col">
      <div class="ipad-landscape">
        <img src="../assets/iPad.png" alt="" class="ipad-frame-img">
        <div class="ipad-screen">
          <div class="sv-topbar" style="display: none;">
            <div class="sv-topbar-left">
              <img src="../assets/FagPrat - logo.png" alt="FagPrat" class="sv-topbar-logo">
              <div class="sv-topbar-divider"></div>
              <span class="sv-topbar-title">Brøk, prosent og desimaltall</span>
            </div>
            <div class="sv-topbar-right">
              <span class="sv-nickname-badge sv-nickname-display"></span>
              <span class="sv-lobby-badge">Lobby</span>
            </div>
          </div>
          <div class="sv-body">

            <!-- State 1: Enter code -->
            <div class="sv-state active" data-state="1">
              <img src="../assets/FagPrat - logo.png" alt="FagPrat" class="sv-logo-large">
              <div class="sv-form-title">Skriv inn koden</div>
              <div class="sv-input-wrap">
                <input type="text" class="sv-input sv-code-input" placeholder="ABC123" maxlength="6" autocomplete="off">
              </div>
              <button class="sv-primary-btn sv-join-btn">Bli med</button>
              <span class="sv-error-text" id="sv-code-error" style="display:none">Ugyldig kode. Prøv igjen!</span>
              <span class="sv-helper-text">Koden vises på tavlen</span>
            </div>

            <!-- State 2: Enter nickname -->
            <div class="sv-state" data-state="2">
              <img src="../assets/FagPrat - logo.png" alt="FagPrat" class="sv-logo-large">
              <div class="sv-form-title">Velg et kallenavn</div>
              <div class="sv-input-wrap">
                <input type="text" class="sv-input sv-input-nickname sv-nickname-input" placeholder="Ditt kallenavn" maxlength="20" autocomplete="off">
              </div>
              <button class="sv-primary-btn sv-ready-btn">Klar!</button>
              <span class="sv-helper-text">Andre elever ser ikke kallenavnet ditt</span>
            </div>

            <!-- State 3: Waiting for teacher -->
            <div class="sv-state" data-state="3">
              <div class="sv-professor">
                <img src="../assets/Professoren.png" alt="Professoren" class="sv-professor-img">
              </div>
              <div class="sv-welcome">Hei, <span class="sv-welcome-name"></span>!</div>
              <div class="sv-professor-label">Venter på at læreren starter aktiviteten</div>
              <div class="waiting-dots"><span></span><span></span><span></span></div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var screen = document.querySelector('.ipad-screen');

    // Auto-uppercase code input
    var codeInput = screen.querySelector('.sv-code-input');
    if (codeInput) {
      codeInput.addEventListener('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      });
    }

    // "Bli med" → validate code, then go to nickname state
    var VALID_CODE = 'UBD2TS';
    var joinBtn = screen.querySelector('.sv-join-btn');
    if (joinBtn) {
      joinBtn.addEventListener('click', function() {
        var input = screen.querySelector('.sv-code-input');
        var errorEl = document.getElementById('sv-code-error');
        var code = input.value.trim();
        if (code.length === 0) {
          input.focus();
          return;
        }
        if (code !== VALID_CODE) {
          // Show error + shake input
          input.style.borderColor = 'var(--color-error)';
          input.style.animation = 'shake 0.4s ease';
          if (errorEl) errorEl.style.display = '';
          setTimeout(function() { input.style.animation = ''; }, 400);
          // Reset border after a moment
          setTimeout(function() {
            input.style.borderColor = '';
            if (errorEl) errorEl.style.display = 'none';
          }, 2500);
          input.focus();
          return;
        }
        // Valid code
        if (errorEl) errorEl.style.display = 'none';
        input.style.borderColor = '';
        switchState(2);
        var nicknameInput = screen.querySelector('.sv-nickname-input');
        if (nicknameInput) setTimeout(function() { nicknameInput.focus(); }, 100);
      });
    }

    // "Klar!" → go to waiting state
    var readyBtn = screen.querySelector('.sv-ready-btn');
    if (readyBtn) {
      readyBtn.addEventListener('click', function() {
        var nickname = screen.querySelector('.sv-nickname-input').value.trim();
        if (nickname.length === 0) {
          screen.querySelector('.sv-nickname-input').focus();
          return;
        }
        screen.querySelectorAll('.sv-welcome-name').forEach(function(el) { el.textContent = nickname; });
        screen.querySelectorAll('.sv-nickname-display').forEach(function(el) { el.textContent = nickname; });
        var topbar = screen.querySelector('.sv-topbar');
        if (topbar) topbar.style.display = '';
        switchState(3);
        // Send nickname to parent demo
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'fagprat-student-nickname', nickname: nickname }, '*');
        }
      });
    }

    // Enter key support
    screen.querySelectorAll('.sv-input').forEach(function(input) {
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var state = input.closest('.sv-state');
          var btn = state.querySelector('.sv-primary-btn');
          if (btn) btn.click();
        }
      });
    });

    function switchState(stateNum) {
      screen.querySelectorAll('.sv-state').forEach(function(s) { s.classList.remove('active'); });
      var target = screen.querySelector('[data-state="' + stateNum + '"]');
      if (target) target.classList.add('active');
    }
  </script>
</body>
</html>
